<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Slither Kerala Arena</title>
  <style>
    :root {
      --bg-deep: #07150e;
      --bg-mid: #0d2d1d;
      --bg-soft: #1d4b2a;
      --gold: #d8a93a;
      --gold-soft: #f0cb72;
      --leaf: #7ed957;
      --leaf-soft: #b9ee7d;
      --text: #f8f4e8;
      --text-muted: rgba(248, 244, 232, 0.72);
      --panel: rgba(7, 21, 14, 0.7);
      --panel-border: rgba(240, 203, 114, 0.24);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(216, 169, 58, 0.12), transparent 30%),
        radial-gradient(circle at bottom left, rgba(126, 217, 87, 0.16), transparent 35%),
        linear-gradient(180deg, var(--bg-soft), var(--bg-mid) 38%, var(--bg-deep));
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #score-box,
    #rank-box,
    #leaderboard,
    #boost-panel,
    #mobile-hint {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }

    #score-box,
    #rank-box {
      position: fixed;
      top: 18px;
      padding: 12px 16px;
      border-radius: 18px;
      min-width: 108px;
    }

    #score-box {
      right: 20px;
      text-align: right;
    }

    #rank-box {
      left: 20px;
    }

    .label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .val {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    #leaderboard {
      position: fixed;
      top: 92px;
      right: 20px;
      width: 210px;
      padding: 14px 16px;
      border-radius: 20px;
    }

    #leaderboard h3 {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 8px;
    }

    .lb-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      padding: 4px 0;
      color: rgba(248, 244, 232, 0.84);
    }

    .lb-row .lb-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 136px;
    }

    .lb-row.me {
      color: var(--gold-soft);
      font-weight: 700;
    }

    #boost-panel {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
    }

    #boost-panel span {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    #boost-bar-bg {
      width: 160px;
      height: 8px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      overflow: hidden;
    }

    #boost-bar {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--leaf), var(--gold));
      border-radius: 999px;
      transition: width 0.1s linear;
    }

    #minimap {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(240, 203, 114, 0.26);
      background: rgba(7, 21, 14, 0.65);
      box-shadow: 0 10px 26px rgba(0, 0, 0, 0.24);
    }

    #minimap canvas {
      width: 132px;
      height: 132px;
    }

    #mobile-hint {
      position: fixed;
      left: 20px;
      bottom: 20px;
      display: none;
      max-width: 180px;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--text-muted);
    }

    #touch-pill {
      position: fixed;
      left: 14px;
      bottom: 14px;
      display: none;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(7, 21, 14, 0.68);
      border: 1px solid rgba(240, 203, 114, 0.18);
      color: rgba(248, 244, 232, 0.78);
      font-size: 11px;
      letter-spacing: 0.8px;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }

    #menu,
    #death-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      pointer-events: all;
      z-index: 10;
      background:
        linear-gradient(180deg, rgba(4, 16, 11, 0.9), rgba(7, 21, 14, 0.94)),
        radial-gradient(circle at top, rgba(216, 169, 58, 0.12), transparent 35%);
    }

    #death-screen {
      display: none;
    }

    #menu-card,
    #death-card {
      width: min(92vw, 420px);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(10, 29, 19, 0.82);
      border: 1px solid rgba(240, 203, 114, 0.2);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.3);
      text-align: center;
      animation: rise 400ms ease-out;
    }

    @keyframes rise {
      from {
        transform: translateY(18px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    #menu h1 {
      font-size: clamp(42px, 11vw, 68px);
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--gold-soft);
      text-shadow: 0 0 26px rgba(216, 169, 58, 0.18);
      margin-bottom: 10px;
    }

    #menu p,
    #death-score {
      color: var(--text-muted);
      margin-bottom: 22px;
      line-height: 1.5;
    }

    #name-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(240, 203, 114, 0.24);
      border-radius: 999px;
      color: var(--text);
      font-size: 18px;
      padding: 14px 18px;
      text-align: center;
      outline: none;
      margin-bottom: 18px;
    }

    #name-input:focus {
      border-color: rgba(240, 203, 114, 0.46);
    }

    #menu-skins-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    #skin-picker {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 22px;
    }

    .skin-opt {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s ease, border-color 0.15s ease;
      pointer-events: all;
      position: relative;
    }

    .skin-opt.selected {
      border-color: var(--gold-soft);
      transform: scale(1.12);
    }

    .skin-opt::after {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.5), transparent 62%);
    }

    #play-btn,
    #respawn-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #132312;
      background: linear-gradient(135deg, var(--gold-soft), var(--leaf-soft));
      box-shadow: 0 12px 30px rgba(126, 217, 87, 0.18);
      cursor: pointer;
    }

    #death-screen h2 {
      font-size: clamp(36px, 10vw, 52px);
      font-weight: 900;
      color: #f2b94d;
      margin-bottom: 8px;
    }

    @media (max-width: 820px) {
      #ui {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      #leaderboard {
        display: none;
      }

      #score-box,
      #rank-box {
        top: 12px;
        min-width: 72px;
        padding: 8px 10px;
        border-radius: 14px;
      }

      .label {
        font-size: 9px;
        margin-bottom: 2px;
      }

      .val {
        font-size: 18px;
      }

      #boost-panel {
        bottom: 14px;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 16px;
      }

      #boost-panel span {
        font-size: 10px;
      }

      #boost-bar-bg {
        width: 86px;
        height: 6px;
      }

      #minimap {
        width: 84px;
        height: 84px;
        right: 14px;
        bottom: 14px;
        opacity: 0.8;
        box-shadow: none;
      }

      #mobile-hint {
        display: block;
        left: 14px;
        bottom: 56px;
        max-width: 150px;
        padding: 8px 10px;
        font-size: 11px;
        border-radius: 14px;
      }

      #touch-pill {
        display: block;
      }
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>

  <div id="ui">
    <div id="score-box">
      <div class="label">Score</div>
      <div class="val" id="score-val">0</div>
    </div>
    <div id="rank-box">
      <div class="label">Rank</div>
      <div class="val" id="rank-val">#-</div>
    </div>
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <div id="lb-list"></div>
    </div>
    <div id="boost-panel"><span>BOOST</span>
      <div id="boost-bar-bg">
        <div id="boost-bar"></div>
      </div>
    </div>
    <div id="mobile-hint">Drag anywhere to steer. Hold your finger to boost.</div>
    <div id="touch-pill">DRAG TO TURN</div>
    <div id="minimap"><canvas id="mm-canvas" width="132" height="132"></canvas></div>
  </div>

  <div id="menu">
    <div id="menu-card">
      <h1>SLITHER</h1>
      <p>Glide through a Kerala-inspired arena, gather glowing orbs, and outlast every rival.</p>
      <input id="name-input" type="text" maxlength="16" placeholder="Enter your name" value="Player">
      <div id="menu-skins-label">Choose Skin</div>
      <div id="skin-picker"></div>
      <button id="play-btn">Play</button>
    </div>
  </div>

  <div id="death-screen">
    <div id="death-card">
      <h2>You Died</h2>
      <div id="death-score"></div>
      <button id="respawn-btn">Respawn</button>
    </div>
  </div>

  <script>
    // ─── SERVER CONFIG ────────────────────────────────────────────────────────────
    // After deploying to Cloudflare Workers, paste your worker URL here.
    const MATCHMAKER_URL = 'https://slither-kerala.razikv-co-in.workers.dev';

    // Kerala-inspired room names. Each room is a separate Durable Object.
    const ROOMS = ['backwaters', 'munnar', 'varkala', 'kovalam', 'thekkady'];

    let ws = null;

function connectToRoom() {
  const room = ROOMS[Math.floor(Math.random() * ROOMS.length)];
  const baseUrl = new URL(MATCHMAKER_URL);
  baseUrl.protocol = baseUrl.protocol === 'https:' ? 'wss:' : 'ws:';
  baseUrl.pathname = '/room';
  baseUrl.search = `?room=${encodeURIComponent(room)}`;
  const wsUrl = baseUrl.toString();

  console.log('Connecting to room:', room, wsUrl);

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    console.log('Connected');
  };

  ws.onerror = (err) => {
    console.error('WebSocket error:', err);
  };

  ws.onclose = () => {
    console.log('WebSocket closed');
    if (gameRunning) {
      setTimeout(connectToRoom, 2000);
    }
  };

  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }
    handleServerMessage(msg);
  };
}

      

      
    function wsSend(type, payload) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type, ...payload }));
      }
    }

    function handleServerMessage(msg) {
      switch (msg.type) {
        case 'init':
          localPlayerId = msg.id;
          WORLD = msg.WORLD || WORLD;
          serverTickMs = msg.tickMs || serverTickMs;
          break;
        case 'joinDenied':
          alert(msg.message || 'Arena is full right now.');
          document.getElementById('menu').style.display = 'flex';
          document.getElementById('death-screen').style.display = 'none';
          gameRunning = false;
          break;
        case 'gameState':
          WORLD = msg.world || WORLD;
          serverTickMs = msg.tickMs || serverTickMs;
          orbs = msg.orbs || [];
          scoreboard = msg.leaderboard || [];
          selfState = msg.self || {};
          reconcileSnakes(msg.players || [], msg.bots || []);
          break;
        case 'particleSpawn':
          // room.js sends a batched { events: [{x,y,color,n}, ...] }
          if (Array.isArray(msg.events)) {
            for (const e of msg.events) spawnParticles(e.x, e.y, e.color, e.n);
          } else {
            spawnParticles(msg.x, msg.y, msg.color, msg.n); // legacy fallback
          }
          break;
        case 'died':
          gameRunning = false;
          document.getElementById('death-screen').style.display = 'flex';
          document.getElementById('death-score').textContent = `Final score: ${msg.score}`;
          break;
      }
    }

    // Connect immediately so WebSocket is ready before the player hits Play
    connectToRoom();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const mmCanvas = document.getElementById('mm-canvas');
    const mmCtx = mmCanvas.getContext('2d', { desynchronized: true });

    const SKINS = [
      { name: 'Coconut', body: '#5fbf6a', glow: '#8bd39a', head: '#2f6f46', eye: '#fef9e8' },
      { name: 'Leaf', body: '#7ed957', glow: '#9ff06f', head: '#3f7d2b', eye: '#fef9e8' },
      { name: 'Lotus', body: '#d67a52', glow: '#f3a96d', head: '#8c4b2d', eye: '#fff7df' },
      { name: 'Temple Gold', body: '#d8a93a', glow: '#f0cb72', head: '#8f6517', eye: '#1d1808' },
      { name: 'Monsoon', body: '#4bb48c', glow: '#73d0ab', head: '#236b56', eye: '#f3f8ef' },
      { name: 'Paddy', body: '#95c94d', glow: '#c2ea6a', head: '#55751d', eye: '#fffce6' },
      { name: 'Spice', body: '#c96d34', glow: '#e2a15a', head: '#7f3d17', eye: '#fff6e0' },
      { name: 'Backwater', body: '#3aa680', glow: '#67cfa7', head: '#16614b', eye: '#eefcf7' },
    ];

    const IS_TOUCH = matchMedia('(pointer: coarse)').matches || navigator.maxTouchPoints > 0;
    const MAX_TRAIL_POINTS = 140;
    const SNAKE_CULL_MARGIN = 260;
    const ORB_CULL_MARGIN = 40;
    const INPUT_SEND_MS = 50;
    const INTERPOLATION_BACK_TIME = 100;
    const TOUCH_RADIUS = 72;

    let WORLD = 4000;
    let serverTickMs = 72;
    let localPlayerId = null;
    let selectedSkin = 0;
    let gameRunning = false;
    let lastFrameTime = performance.now();
    let lastInputSentAt = 0;
    let lastHudRefreshAt = 0;
    let lastMinimapDrawAt = 0;
    let lastFpsSampleAt = performance.now();
    let fpsFrames = 0;
    let averageFps = 60;
    let scoreboard = [];
    let selfState = {};

    const snakes = new Map();
    let orbs = [];
    let particles = [];

    const quality = {
      renderScale: IS_TOUCH ? 0.82 : 1,
      orbBudget: IS_TOUCH ? 50 : 100,
      trailStep: IS_TOUCH ? 2 : 1,
      trailCap: IS_TOUCH ? 90 : MAX_TRAIL_POINTS,
      minimapIntervalMs: IS_TOUCH ? 180 : 90,
      showRemoteNames: !IS_TOUCH,
    };

    let backgroundPattern = null;
    const camera = { x: 0, y: 0 };
    const pointer = {
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      active: false,
      boosting: false,
      touchId: null,
      touchStartAt: 0,
      anchorX: window.innerWidth / 2,
      anchorY: window.innerHeight / 2,
      visualX: 0,
      visualY: 0,
    };

    function rebuildBackgroundPattern() {
      const tile = document.createElement('canvas');
      tile.width = 48;
      tile.height = 48;
      const tileCtx = tile.getContext('2d');
      tileCtx.fillStyle = 'rgba(240, 203, 114, 0.065)';
      tileCtx.fillRect(8, 8, 2, 2);
      tileCtx.fillRect(28, 16, 2, 2);
      tileCtx.fillRect(16, 32, 2, 2);
      tileCtx.fillRect(38, 38, 2, 2);
      backgroundPattern = ctx.createPattern(tile, 'repeat');
    }

    function viewportWidth() {
      return window.innerWidth;
    }

    function viewportHeight() {
      return window.innerHeight;
    }

    function resizeCanvas() {
      const dprCap = IS_TOUCH ? 1 : 1.25;
      const pixelRatio = Math.max(0.65, Math.min(window.devicePixelRatio || 1, dprCap) * quality.renderScale);
      canvas.width = Math.round(window.innerWidth * pixelRatio);
      canvas.height = Math.round(window.innerHeight * pixelRatio);
      canvas.style.width = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      rebuildBackgroundPattern();
    }

    resizeCanvas();

    const picker = document.getElementById('skin-picker');
    SKINS.forEach((skin, index) => {
      const option = document.createElement('div');
      option.className = 'skin-opt' + (index === 0 ? ' selected' : '');
      option.style.background = skin.body;
      option.style.boxShadow = `0 0 16px ${skin.glow}66`;
      option.onclick = () => {
        selectedSkin = index;
        document.querySelectorAll('.skin-opt').forEach((node, i) => node.classList.toggle('selected', i === index));
      };
      picker.appendChild(option);
    });

    function wrapCoord(value) {
      return ((value % WORLD) + WORLD) % WORLD;
    }

    function shortestWrappedDelta(from, to) {
      let delta = to - from;
      if (delta > WORLD / 2) delta -= WORLD;
      if (delta < -WORLD / 2) delta += WORLD;
      return delta;
    }

    function unwrapPosition(previous, next) {
      if (!previous) return { x: next.x, y: next.y };
      return {
        x: previous.x + shortestWrappedDelta(wrapCoord(previous.x), next.x),
        y: previous.y + shortestWrappedDelta(wrapCoord(previous.y), next.y),
      };
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function angleLerp(a, b, t) {
      let diff = b - a;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      return a + diff * t;
    }

    function getSnakeRadius(length) {
      return Math.min(32, 18 + length / 60);
    }

    function getTrailSpacing() {
      return 6;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getRenderedSnake(entityId, renderTime) {
      const snake = snakes.get(entityId);
      if (!snake || !snake.network.current) return null;

      const previous = snake.network.previous || snake.network.current;
      const current = snake.network.current;
      const duration = Math.max(1, current.receivedAt - previous.receivedAt || serverTickMs);
      const t = clamp((renderTime - previous.receivedAt) / duration, 0, 1);
      const x = lerp(previous.unwrappedX, current.unwrappedX, t);
      const y = lerp(previous.unwrappedY, current.unwrappedY, t);

      return {
        id: snake.id,
        name: snake.name,
        skinIdx: snake.skinIdx,
        angle: angleLerp(previous.angle, current.angle, t),
        length: lerp(previous.length, current.length, t),
        x,
        y,
        radius: getSnakeRadius(current.length),
        isLocal: snake.id === localPlayerId,
      };
    }

    function ensureSnakeSnapshot(snapshot, isPlayer) {
      const now = performance.now();
      let snake = snakes.get(snapshot.id);

      if (!snake) {
        const initial = {
          x: snapshot.x,
          y: snapshot.y,
          unwrappedX: snapshot.x,
          unwrappedY: snapshot.y,
          angle: snapshot.angle,
          length: snapshot.length,
          receivedAt: now,
        };

        snake = {
          id: snapshot.id,
          name: snapshot.name,
          skinIdx: snapshot.skinIdx,
          isPlayer,
          network: { previous: initial, current: initial },
          trail: [{ x: initial.unwrappedX, y: initial.unwrappedY }],
          render: { x: initial.unwrappedX, y: initial.unwrappedY, angle: initial.angle },
          lastSeenAt: now,
        };
        snakes.set(snapshot.id, snake);
        return snake;
      }

      const prevCurrent = snake.network.current;
      const unwrapped = unwrapPosition(
        { x: prevCurrent.unwrappedX, y: prevCurrent.unwrappedY },
        { x: snapshot.x, y: snapshot.y }
      );

      snake.name = snapshot.name;
      snake.skinIdx = snapshot.skinIdx;
      snake.isPlayer = isPlayer;
      snake.network.previous = prevCurrent;
      snake.network.current = {
        x: snapshot.x,
        y: snapshot.y,
        unwrappedX: unwrapped.x,
        unwrappedY: unwrapped.y,
        angle: snapshot.angle,
        length: snapshot.length,
        receivedAt: now,
      };
      snake.lastSeenAt = now;
      return snake;
    }

    function reconcileSnakes(playerSnapshots, botSnapshots) {
      const liveIds = new Set();

      playerSnapshots.forEach((snapshot) => {
        liveIds.add(snapshot.id);
        ensureSnakeSnapshot(snapshot, true);
      });

      botSnapshots.forEach((snapshot) => {
        liveIds.add(snapshot.id);
        ensureSnakeSnapshot(snapshot, false);
      });

      for (const [id, snake] of snakes.entries()) {
        if (!liveIds.has(id) && id !== localPlayerId) {
          snakes.delete(id);
          continue;
        }

        if (!liveIds.has(id) && id === localPlayerId && !gameRunning) {
          snakes.delete(id);
        }
      }
    }



    function spawnParticles(x, y, color, count) {
      const reducedCount = Math.max(1, Math.ceil(count * 0.5));
      for (let i = 0; i < reducedCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 4;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: 2 + Math.random() * 4,
          color,
          life: 1,
          decay: 0.03 + Math.random() * 0.04,
        });
      }
    }

    function getViewportBounds(margin = 0) {
      return {
        left: -margin,
        top: -margin,
        right: viewportWidth() + margin,
        bottom: viewportHeight() + margin,
      };
    }

    function isOnScreen(screenX, screenY, bounds) {
      return screenX >= bounds.left && screenX <= bounds.right && screenY >= bounds.top && screenY <= bounds.bottom;
    }

    function updateParticles(deltaScale) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const particle = particles[i];
        particle.x += particle.vx * deltaScale;
        particle.y += particle.vy * deltaScale;
        particle.vx *= 0.96;
        particle.vy *= 0.96;
        particle.life -= particle.decay * deltaScale;
        if (particle.life <= 0) particles.splice(i, 1);
      }
    }

    function updateSnakeTrails(renderTime) {
      for (const snake of snakes.values()) {
        const rendered = getRenderedSnake(snake.id, renderTime);
        if (!rendered) continue;

        snake.render = { x: rendered.x, y: rendered.y, angle: rendered.angle, length: rendered.length };

        const trail = snake.trail;
        const lastPoint = trail[trail.length - 1];
        const dx = rendered.x - lastPoint.x;
        const dy = rendered.y - lastPoint.y;

        if (dx * dx + dy * dy > 4) {
          trail.push({ x: rendered.x, y: rendered.y });
        } else {
          trail[trail.length - 1] = { x: rendered.x, y: rendered.y };
        }

        const maxLength = Math.max(18, Math.ceil(rendered.length) + 12);
        while (trail.length > Math.min(quality.trailCap, maxLength)) {
          trail.shift();
        }
      }
    }

    function toScreen(worldX, worldY, camX, camY) {
      const dx = shortestWrappedDelta(camX, wrapCoord(worldX));
      const dy = shortestWrappedDelta(camY, wrapCoord(worldY));
      return {
        x: viewportWidth() / 2 + dx,
        y: viewportHeight() / 2 + dy,
      };
    }

    function drawBackground() {
      const width = viewportWidth();
      const height = viewportHeight();

      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, '#163924');
      gradient.addColorStop(0.45, '#0d291a');
      gradient.addColorStop(1, '#06120c');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      if (!backgroundPattern) return;

      ctx.save();
      ctx.translate(((-camera.x) % 48 + 48) % 48, ((-camera.y) % 48 + 48) % 48);
      ctx.fillStyle = backgroundPattern;
      ctx.globalAlpha = IS_TOUCH ? 0.5 : 1;
      ctx.fillRect(-48, -48, width + 96, height + 96);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function getVisibleOrbs(renderTime, bounds) {
      const visibleOrbs = [];
      for (const orb of orbs) {
        const screen = toScreen(orb.x, orb.y, camera.x, camera.y);
        if (!isOnScreen(screen.x, screen.y, bounds)) continue;

        visibleOrbs.push({
          orb,
          screenX: screen.x,
          screenY: screen.y,
          radius: orb.r + Math.sin((orb.pulse || 0) + renderTime * 0.006) * 1.3,
        });
      }

      if (visibleOrbs.length > quality.orbBudget) {
        visibleOrbs.sort((a, b) => {
          const da = (a.screenX - viewportWidth() / 2) ** 2 + (a.screenY - viewportHeight() / 2) ** 2;
          const db = (b.screenX - viewportWidth() / 2) ** 2 + (b.screenY - viewportHeight() / 2) ** 2;
          return da - db;
        });
        visibleOrbs.length = quality.orbBudget;
      }

      return visibleOrbs;
    }

    function drawOrbs(visibleOrbs) {
      for (const visible of visibleOrbs) {
        const { orb, screenX, screenY, radius } = visible;

        ctx.beginPath();
        ctx.arc(screenX, screenY, radius, 0, Math.PI * 2);
        ctx.fillStyle = orb.color;
        if (!IS_TOUCH) {
          ctx.shadowColor = orb.color;
          ctx.shadowBlur = 10;
        }
        ctx.fill();

        if (!IS_TOUCH) {
          ctx.shadowBlur = 0;
          ctx.beginPath();
          ctx.arc(screenX - radius * 0.24, screenY - radius * 0.24, radius * 0.28, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,0.55)';
          ctx.fill();
        }
      }
      ctx.shadowBlur = 0;
    }

    function drawParticles(bounds) {
      ctx.shadowBlur = 0;
      for (const particle of particles) {
        const screen = toScreen(particle.x, particle.y, camera.x, camera.y);
        if (!isOnScreen(screen.x, screen.y, bounds)) continue;
        ctx.globalAlpha = particle.life;
        ctx.beginPath();
        ctx.arc(screen.x, screen.y, particle.r, 0, Math.PI * 2);
        ctx.fillStyle = particle.color;
        if (!IS_TOUCH) {
          ctx.shadowColor = particle.color;
          ctx.shadowBlur = 6;
        }
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function getVisibleSnakes() {
      const bounds = getViewportBounds(SNAKE_CULL_MARGIN);
      const visibleSnakes = [];

      for (const snake of snakes.values()) {
        if (!snake.render) continue;
        const head = toScreen(snake.render.x, snake.render.y, camera.x, camera.y);
        if (!isOnScreen(head.x, head.y, bounds)) continue;
        visibleSnakes.push(snake);
      }

      visibleSnakes.sort((a, b) => (a.render.length || 0) - (b.render.length || 0));
      return visibleSnakes;
    }

    function drawSnake(snake) {
      const skin = SKINS[snake.skinIdx] || SKINS[0];
      const trail = snake.trail;
      const radius = getSnakeRadius(snake.render.length || snake.network.current.length);

      if (trail.length > 1) {
        ctx.beginPath();
        const first = toScreen(trail[0].x, trail[0].y, camera.x, camera.y);
        ctx.moveTo(first.x, first.y);

        for (let i = quality.trailStep; i < trail.length; i += quality.trailStep) {
          const current = toScreen(trail[i].x, trail[i].y, camera.x, camera.y);
          const previous = toScreen(trail[Math.max(0, i - quality.trailStep)].x, trail[Math.max(0, i - quality.trailStep)].y, camera.x, camera.y);
          const midX = (current.x + previous.x) / 2;
          const midY = (current.y + previous.y) / 2;
          ctx.quadraticCurveTo(previous.x, previous.y, midX, midY);
        }

        ctx.strokeStyle = skin.body;
        ctx.lineWidth = radius * 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if (!IS_TOUCH) {
          ctx.shadowColor = skin.glow;
          ctx.shadowBlur = snake.id === localPlayerId ? 16 : 10;
        }
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255,255,255,0.14)';
        ctx.lineWidth = radius * 0.9;
        ctx.shadowBlur = 0;
        ctx.stroke();
      }

      const head = toScreen(snake.render.x, snake.render.y, camera.x, camera.y);

      ctx.beginPath();
      ctx.arc(head.x, head.y, radius * 1.18, 0, Math.PI * 2);
      ctx.fillStyle = skin.head;
      if (!IS_TOUCH) {
        ctx.shadowColor = skin.glow;
        ctx.shadowBlur = 12;
      }
      ctx.fill();
      ctx.shadowBlur = 0;

      const angle = snake.render.angle;
      const eyeOffset = radius * 0.55;
      const eyeR = radius * 0.3;
      const perpX = -Math.sin(angle);
      const perpY = Math.cos(angle);
      const fwdX = Math.cos(angle) * radius * 0.32;
      const fwdY = Math.sin(angle) * radius * 0.32;

      for (const side of [-1, 1]) {
        const ex = head.x + fwdX + perpX * eyeOffset * side;
        const ey = head.y + fwdY + perpY * eyeOffset * side;

        ctx.beginPath();
        ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
        ctx.fillStyle = skin.eye;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(ex + Math.cos(angle) * eyeR * 0.3, ey + Math.sin(angle) * eyeR * 0.3, eyeR * 0.42, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
      }

      if (quality.showRemoteNames || snake.id === localPlayerId) {
        ctx.font = `bold ${Math.max(11, radius)}px Trebuchet MS`;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        ctx.fillText(snake.name, head.x + 1, head.y - radius * 2.15 + 1);
        ctx.fillStyle = '#fffaf0';
        ctx.fillText(snake.name, head.x, head.y - radius * 2.15);
      }
    }

    function drawMinimap(now) {
      if (now - lastMinimapDrawAt < quality.minimapIntervalMs) return;
      lastMinimapDrawAt = now;

      const size = mmCanvas.width;
      mmCtx.clearRect(0, 0, size, size);
      mmCtx.save();
      mmCtx.beginPath();
      mmCtx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      mmCtx.clip();

      const bg = mmCtx.createLinearGradient(0, 0, 0, size);
      bg.addColorStop(0, 'rgba(20, 61, 39, 0.92)');
      bg.addColorStop(1, 'rgba(7, 21, 14, 0.96)');
      mmCtx.fillStyle = bg;
      mmCtx.fillRect(0, 0, size, size);

      const scale = size / WORLD;

      for (let i = 0; i < orbs.length; i += (IS_TOUCH ? 9 : 5)) {
        const orb = orbs[i];
        if (!orb) continue;
        mmCtx.beginPath();
        mmCtx.arc(orb.x * scale, orb.y * scale, 1.4, 0, Math.PI * 2);
        mmCtx.fillStyle = orb.color + '88';
        mmCtx.fill();
      }

      for (const snake of snakes.values()) {
        if (!snake.render) continue;
        mmCtx.beginPath();
        mmCtx.arc(wrapCoord(snake.render.x) * scale, wrapCoord(snake.render.y) * scale, snake.id === localPlayerId ? 3.6 : 2.4, 0, Math.PI * 2);
        mmCtx.fillStyle = snake.id === localPlayerId ? '#fff7df' : (SKINS[snake.skinIdx] || SKINS[0]).body;
        if (!IS_TOUCH) {
          if (snake.id === localPlayerId) {
            mmCtx.shadowColor = '#fff7df';
            mmCtx.shadowBlur = 7;
          } else {
            mmCtx.shadowBlur = 0;
          }
        }
        mmCtx.fill();
        mmCtx.shadowBlur = 0;
      }

      mmCtx.restore();
    }

    function updateLeaderboard(now) {
      if (now - lastHudRefreshAt < (IS_TOUCH ? 180 : 120)) return;
      lastHudRefreshAt = now;

      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      scoreboard.forEach((entry, index) => {
        const row = document.createElement('div');
        row.className = 'lb-row' + (entry.id === localPlayerId ? ' me' : '');
        row.innerHTML = `<span class="lb-name">${index + 1}. ${entry.name}</span><span>${entry.score}</span>`;
        list.appendChild(row);
      });

      const me = selfState[localPlayerId] || { rank: 0, score: 0, boostE: 0 };
      document.getElementById('rank-val').textContent = me.rank ? `#${me.rank}` : '#-';
      document.getElementById('score-val').textContent = me.score || 0;
      document.getElementById('boost-bar').style.width = `${Math.max(0, Math.min(100, (me.boostE || 0) * 100))}%`;
    }

    function drawCursor() {
      if (IS_TOUCH) return;
      ctx.beginPath();
      ctx.arc(pointer.x, pointer.y, 6, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(pointer.x, pointer.y, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }

    function updateQuality(now) {
      fpsFrames += 1;
      const sampleDuration = now - lastFpsSampleAt;
      if (sampleDuration < 600) return;

      averageFps = (fpsFrames * 1000) / sampleDuration;
      fpsFrames = 0;
      lastFpsSampleAt = now;

      let nextScale = quality.renderScale;
      if (averageFps < 42) nextScale = Math.max(IS_TOUCH ? 0.62 : 0.78, nextScale - 0.08);
      else if (averageFps > 56) nextScale = Math.min(IS_TOUCH ? 0.88 : 1, nextScale + 0.04);

      quality.orbBudget = averageFps < 42 ? (IS_TOUCH ? 32 : 70) : (IS_TOUCH ? 50 : 100);
      quality.trailStep = averageFps < 42 ? (IS_TOUCH ? 3 : 2) : (IS_TOUCH ? 2 : 1);
      quality.trailCap = averageFps < 42 ? (IS_TOUCH ? 64 : 110) : (IS_TOUCH ? 90 : MAX_TRAIL_POINTS);

      if (Math.abs(nextScale - quality.renderScale) >= 0.04) {
        quality.renderScale = nextScale;
        resizeCanvas();
      }
    }

    function getLocalSnake() {
      return localPlayerId ? snakes.get(localPlayerId) : null;
    }

    function updateCamera() {
      const me = getLocalSnake();
      if (!me || !me.render) return;
      camera.x += (me.render.x - camera.x) * 0.1;
      camera.y += (me.render.y - camera.y) * 0.1;
    }

    function sendInput(now) {
      const me = getLocalSnake();
      if (!me || !gameRunning) return;
      if (now - lastInputSentAt < INPUT_SEND_MS) return;

      const dx = pointer.x - viewportWidth() / 2;
      const dy = pointer.y - viewportHeight() / 2;
      const angle = Math.atan2(dy, dx || 0.0001);
      wsSend('input', { angle, boosting: pointer.boosting });
      lastInputSentAt = now;
    }

    function drawTouchGuide() {
      if (!IS_TOUCH || !pointer.active) return;

      const baseX = pointer.anchorX;
      const baseY = pointer.anchorY;
      const knobX = baseX + pointer.visualX;
      const knobY = baseY + pointer.visualY;

      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.arc(baseX, baseY, TOUCH_RADIUS, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(7, 21, 14, 0.28)';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(240, 203, 114, 0.18)';
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(knobX, knobY, 24, 0, Math.PI * 2);
      ctx.fillStyle = pointer.boosting ? 'rgba(216, 169, 58, 0.7)' : 'rgba(126, 217, 87, 0.65)';
      ctx.fill();
      ctx.restore();
    }

    function gameLoop(now) {
      if (!gameRunning) return;
      requestAnimationFrame(gameLoop);

      const deltaMs = now - lastFrameTime;
      lastFrameTime = now;
      const deltaScale = Math.min(2.2, deltaMs / 16.67);
      const renderTime = now - INTERPOLATION_BACK_TIME;

      updateQuality(now);
      updateSnakeTrails(renderTime);
      updateCamera();
      sendInput(now);
      updateParticles(deltaScale);

      const orbBounds = getViewportBounds(ORB_CULL_MARGIN);
      const particleBounds = getViewportBounds(24);
      const visibleOrbs = getVisibleOrbs(now, orbBounds);
      const visibleSnakes = getVisibleSnakes();

      drawBackground();
      drawOrbs(visibleOrbs);
      drawParticles(particleBounds);
      visibleSnakes.forEach(drawSnake);

      drawCursor();
      drawTouchGuide();
      drawMinimap(now);
      updateLeaderboard(now);
    }

    function startGame() {
      const name = document.getElementById('name-input').value.trim() || 'Player';
      document.getElementById('menu').style.display = 'none';
      document.getElementById('death-screen').style.display = 'none';

      pointer.boosting = false;
      pointer.active = false;
      pointer.touchId = null;
      pointer.visualX = 0;
      pointer.visualY = 0;
      // If ws is closed/not ready yet, reconnect then join
      if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
        connectToRoom();
        // Wait for ws to open, then join
        const tryJoin = () => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            wsSend('join', { name, skinIdx: selectedSkin });
          } else {
            setTimeout(tryJoin, 100);
          }
        };
        setTimeout(tryJoin, 200);
      } else {
        wsSend('join', { name, skinIdx: selectedSkin });
      }

      if (!gameRunning) {
        gameRunning = true;
        lastFrameTime = performance.now();
        requestAnimationFrame(gameLoop);
      }
    }

    function setPointerFromClient(clientX, clientY) {
      pointer.x = clientX;
      pointer.y = clientY;
    }

    document.addEventListener('mousemove', (event) => {
      setPointerFromClient(event.clientX, event.clientY);
    });

    document.addEventListener('mousedown', (event) => {
      if (event.button !== 0) return;
      pointer.boosting = true;
    });

    document.addEventListener('mouseup', (event) => {
      if (event.button !== 0) return;
      pointer.boosting = false;
    });

    document.addEventListener('touchstart', (event) => {
      const touch = event.touches[0];
      if (!touch) return;

      pointer.touchId = touch.identifier;
      pointer.touchStartAt = performance.now();
      pointer.anchorX = touch.clientX;
      pointer.anchorY = touch.clientY;
      pointer.x = viewportWidth() / 2;
      pointer.y = viewportHeight() / 2;
      pointer.visualX = 0;
      pointer.visualY = 0;
      pointer.boosting = event.touches.length > 1;
      pointer.active = true;
      event.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (event) => {
      const touch = Array.from(event.touches).find((item) => item.identifier === pointer.touchId) || event.touches[0];
      if (!touch) return;

      let dx = touch.clientX - pointer.anchorX;
      let dy = touch.clientY - pointer.anchorY;
      const distance = Math.hypot(dx, dy);
      const clampScale = distance > TOUCH_RADIUS ? TOUCH_RADIUS / distance : 1;
      dx *= clampScale;
      dy *= clampScale;

      pointer.visualX = dx;
      pointer.visualY = dy;
      pointer.x = viewportWidth() / 2 + dx * 2.4;
      pointer.y = viewportHeight() / 2 + dy * 2.4;
      pointer.boosting = event.touches.length > 1 || (performance.now() - pointer.touchStartAt > 180 && distance < 18);
      event.preventDefault();
    }, { passive: false });

    document.addEventListener('touchend', (event) => {
      const stillActive = Array.from(event.touches).find((item) => item.identifier === pointer.touchId);
      if (stillActive) return;
      pointer.active = false;
      pointer.boosting = false;
      pointer.touchId = null;
      pointer.visualX = 0;
      pointer.visualY = 0;
      pointer.x = viewportWidth() / 2;
      pointer.y = viewportHeight() / 2;
      event.preventDefault();
    }, { passive: false });

    document.addEventListener('touchcancel', () => {
      pointer.active = false;
      pointer.boosting = false;
      pointer.touchId = null;
      pointer.visualX = 0;
      pointer.visualY = 0;
      pointer.x = viewportWidth() / 2;
      pointer.y = viewportHeight() / 2;
    }, { passive: false });

    document.addEventListener('keydown', (event) => {
      if (event.code === 'Space') {
        pointer.boosting = true;
        event.preventDefault();
      }
    });

    document.addEventListener('keyup', (event) => {
      if (event.code === 'Space') pointer.boosting = false;
    });

    document.getElementById('play-btn').onclick = startGame;
    document.getElementById('respawn-btn').onclick = startGame;

    window.addEventListener('resize', resizeCanvas);
  </script>
</body>

</html>
