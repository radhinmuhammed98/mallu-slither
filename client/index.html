<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
  <title>Slither Kerala Arena</title>
  <style>
    :root {
      --bg-deep: #07150e;
      --bg-mid: #0d2d1d;
      --bg-soft: #1d4b2a;
      --gold: #d8a93a;
      --gold-soft: #f0cb72;
      --leaf: #7ed957;
      --leaf-soft: #b9ee7d;
      --text: #f8f4e8;
      --text-muted: rgba(248,244,232,0.72);
      --panel: rgba(7,21,14,0.78);
      --panel-border: rgba(240,203,114,0.22);
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      position: fixed; /* prevent iOS scroll bounce */
    }

    body {
      background: linear-gradient(180deg, var(--bg-soft), var(--bg-mid) 38%, var(--bg-deep));
      color: var(--text);
      font-family: "Trebuchet MS","Segoe UI",sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }

    canvas#game {
      display: block;
      position: fixed;
      top: 0; left: 0;
      touch-action: none;
    }

    /* ── HUD ────────────────────────────────────────────────── */
    #ui {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* Top-left cluster: rank + score */
    #hud-topleft {
      position: fixed;
      top: max(14px, env(safe-area-inset-top, 14px));
      left: max(14px, env(safe-area-inset-left, 14px));
      display: flex;
      gap: 8px;
    }

    .hud-badge {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 8px 14px;
      min-width: 68px;
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .hud-val {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      color: var(--gold-soft);
    }

    /* Boost bar — top center */
    #boost-bar-wrap {
      position: fixed;
      top: max(14px, env(safe-area-inset-top, 14px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 999px;
      padding: 7px 14px;
      pointer-events: none;
    }

    #boost-bar-wrap span {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #boost-track {
      width: 110px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    #boost-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--leaf), var(--gold));
      border-radius: 999px;
      transition: width 0.1s linear;
    }

    /* Leaderboard — top right desktop / hidden on mobile */
    #leaderboard {
      position: fixed;
      top: max(14px, env(safe-area-inset-top, 14px));
      right: max(14px, env(safe-area-inset-right, 14px));
      width: 200px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 12px 14px;
    }

    #leaderboard h3 {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 8px;
    }

    .lb-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 0;
      color: rgba(248,244,232,0.82);
    }
    .lb-row .lb-name {
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 130px;
    }
    .lb-row.me { color: var(--gold-soft); font-weight: 700; }

    /* Minimap */
    #minimap {
      position: fixed;
      right: max(14px, env(safe-area-inset-right, 14px));
      bottom: max(14px, env(safe-area-inset-bottom, 14px));
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(240,203,114,0.25);
      background: rgba(7,21,14,0.7);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    #minimap canvas { width: 120px; height: 120px; }

    /* ── MOBILE TOUCH CONTROLS ─────────────────────────────── */
    /* Joystick zone — left side, bottom third */
    #joystick-zone {
      position: fixed;
      left: 0; bottom: 0;
      width: 52%;
      height: 46%;
      pointer-events: none;
      z-index: 6;
      /* visual: semi-transparent pill guide */
    }

    /* Boost button — right side bottom */
    #boost-btn {
      position: fixed;
      right: max(24px, env(safe-area-inset-right, 24px));
      bottom: max(150px, calc(env(safe-area-inset-bottom, 0px) + 150px));
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(7,21,14,0.72);
      border: 2px solid rgba(216,169,58,0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
      pointer-events: all;
      z-index: 7;
      box-shadow: 0 4px 20px rgba(0,0,0,0.35);
      transition: background 0.12s, border-color 0.12s, transform 0.08s;
    }

    #boost-btn.active {
      background: rgba(216,169,58,0.32);
      border-color: var(--gold-soft);
      transform: scale(0.94);
    }

    #boost-btn span {
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-soft);
      font-weight: 700;
    }

    #boost-btn svg { display: block; }

    /* Mobile mini-leaderboard overlay */
    #mobile-lb {
      position: fixed;
      right: max(10px, env(safe-area-inset-right, 10px));
      top: 50%;
      transform: translateY(-50%);
      width: 120px;
      background: rgba(7,21,14,0.65);
      border: 1px solid rgba(240,203,114,0.16);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 8px 10px;
      display: none;
      z-index: 5;
    }

    #mobile-lb .lb-row { font-size: 10px; padding: 2px 0; }
    #mobile-lb .lb-name { max-width: 74px; }

    /* ── MENU / DEATH SCREENS ──────────────────────────────── */
    #menu, #death-screen {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      pointer-events: all;
      z-index: 20;
      background:
        linear-gradient(180deg,rgba(4,16,11,0.92),rgba(7,21,14,0.96)),
        radial-gradient(circle at top,rgba(216,169,58,0.12),transparent 35%);
    }

    #death-screen { display: none; }

    #menu-card, #death-card {
      width: min(94vw, 400px);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(10,29,19,0.88);
      border: 1px solid rgba(240,203,114,0.22);
      box-shadow: 0 20px 60px rgba(0,0,0,0.38);
      text-align: center;
      animation: rise 380ms cubic-bezier(0.22,1,0.36,1);
    }

    @keyframes rise {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #menu h1 {
      font-size: clamp(44px,12vw,68px);
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--gold-soft);
      text-shadow: 0 0 30px rgba(216,169,58,0.22);
      margin-bottom: 8px;
    }

    #menu p {
      color: var(--text-muted);
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.5;
    }

    #name-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(240,203,114,0.22);
      border-radius: 999px;
      color: var(--text);
      font-size: 17px;
      padding: 13px 18px;
      text-align: center;
      outline: none;
      margin-bottom: 18px;
    }
    #name-input:focus { border-color: rgba(240,203,114,0.46); }

    #menu-skins-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    #skin-picker {
      display: flex; flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .skin-opt {
      width: 42px; height: 42px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.14s ease, border-color 0.14s ease;
      pointer-events: all;
      position: relative;
    }
    .skin-opt.selected { border-color: var(--gold-soft); transform: scale(1.13); }
    .skin-opt::after {
      content: '';
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.5), transparent 62%);
    }

    #play-btn, #respawn-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 15px 20px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #132312;
      background: linear-gradient(135deg, var(--gold-soft), var(--leaf-soft));
      box-shadow: 0 12px 30px rgba(126,217,87,0.2);
      cursor: pointer;
      pointer-events: all;
      transition: transform 0.1s;
    }
    #play-btn:active, #respawn-btn:active { transform: scale(0.97); }

    #death-screen h2 {
      font-size: clamp(36px,10vw,52px);
      font-weight: 900;
      color: #f2b94d;
      margin-bottom: 10px;
    }
    #death-score {
      color: var(--text-muted);
      margin-bottom: 22px;
      font-size: 16px;
    }

    /* ── RESPONSIVE ────────────────────────────────────────── */
    @media (max-width: 820px) {
      #leaderboard { display: none; }
      #mobile-lb { display: block; }
      #boost-btn { display: flex; }
      #minimap {
        width: 80px; height: 80px;
        right: max(8px, env(safe-area-inset-right, 8px));
        bottom: max(8px, env(safe-area-inset-bottom, 8px));
      }
      #minimap canvas { width: 80px; height: 80px; }
      #boost-bar-wrap { display: none; } /* replaced by touch boost btn */
      #hud-topleft { top: max(10px, env(safe-area-inset-top, 10px)); left: max(10px, env(safe-area-inset-left, 10px)); }
      .hud-val { font-size: 18px; }
      #boost-btn {
        right: max(16px, env(safe-area-inset-right, 16px));
        bottom: max(100px, calc(env(safe-area-inset-bottom, 0px) + 100px));
      }
    }

    @media (min-width: 821px) {
      #joystick-zone { display: none; }
      #boost-btn { display: none; }
      #mobile-lb { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="ui">
    <!-- Top-left: rank + score badges -->
    <div id="hud-topleft">
      <div class="hud-badge">
        <div class="hud-label">Rank</div>
        <div class="hud-val" id="rank-val">#-</div>
      </div>
      <div class="hud-badge">
        <div class="hud-label">Score</div>
        <div class="hud-val" id="score-val">0</div>
      </div>
    </div>

    <!-- Boost bar (desktop only) -->
    <div id="boost-bar-wrap">
      <span>Boost</span>
      <div id="boost-track"><div id="boost-fill"></div></div>
    </div>

    <!-- Leaderboard desktop -->
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <div id="lb-list"></div>
    </div>

    <!-- Mobile leaderboard -->
    <div id="mobile-lb">
      <div id="mobile-lb-list"></div>
    </div>

    <!-- Minimap -->
    <div id="minimap">
      <canvas id="mm-canvas" width="120" height="120"></canvas>
    </div>
  </div>

  <!-- Touch joystick zone (invisible — drawn on canvas) -->
  <div id="joystick-zone"></div>

  <!-- Boost button (mobile) -->
  <div id="boost-btn">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M14 4L22 14H17V24H11V14H6L14 4Z" fill="#f0cb72" opacity="0.9"/>
    </svg>
    <span>BOOST</span>
  </div>

  <!-- Menu -->
  <div id="menu">
    <div id="menu-card">
      <h1>SLITHER</h1>
      <p>Glide through a Kerala-inspired arena, gather glowing orbs, and outlast every rival.</p>
      <input id="name-input" type="text" maxlength="16" placeholder="Enter your name" value="Player">
      <div id="menu-skins-label">Choose Skin</div>
      <div id="skin-picker"></div>
      <button id="play-btn">▶ Play</button>
    </div>
  </div>

  <!-- Death -->
  <div id="death-screen">
    <div id="death-card">
      <h2>You Died</h2>
      <div id="death-score"></div>
      <button id="respawn-btn">Respawn</button>
    </div>
  </div>

  <script>
    // ─── SERVER CONFIG ────────────────────────────────────────
    const MATCHMAKER_URL = 'https://slither-kerala.razikv-co-in.workers.dev';
    const ROOMS = ['backwaters','munnar','varkala','kovalam','thekkady'];

    let ws = null;

    function connectToRoom() {
      const room = ROOMS[Math.floor(Math.random() * ROOMS.length)];
      const baseUrl = new URL(MATCHMAKER_URL);
      baseUrl.protocol = baseUrl.protocol === 'https:' ? 'wss:' : 'ws:';
      baseUrl.pathname = '/room';
      baseUrl.search = `?room=${encodeURIComponent(room)}`;
      const wsUrl = baseUrl.toString();
      console.log('Connecting to room:', room, wsUrl);

      ws = new WebSocket(wsUrl);
      ws.onopen  = () => console.log('WS connected');
      ws.onerror = (e) => console.error('WS error', e);
      ws.onclose = () => { if (gameRunning) setTimeout(connectToRoom, 2000); };
      ws.onmessage = (e) => {
        let msg; try { msg = JSON.parse(e.data); } catch { return; }
        handleServerMessage(msg);
      };
    }

    function wsSend(type, payload) {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type, ...payload }));
    }

    function handleServerMessage(msg) {
      switch (msg.type) {
        case 'init':
          localPlayerId = msg.id;
          WORLD = msg.WORLD || WORLD;
          serverTickMs = msg.tickMs || serverTickMs;
          prediction.active = false;
          break;
        case 'joinDenied':
          alert(msg.message || 'Arena is full right now.');
          document.getElementById('menu').style.display = 'flex';
          document.getElementById('death-screen').style.display = 'none';
          gameRunning = false;
          break;
        case 'gameState':
          WORLD = msg.world || WORLD;
          serverTickMs = msg.tickMs || serverTickMs;
          orbs = msg.orbs || [];
          scoreboard = msg.leaderboard || [];
          selfState = msg.self || {};
          reconcileSnakes(msg.players || [], msg.bots || []);
          
          // Seed prediction once from first server snapshot
          if (localPlayerId && !prediction.active) {
            const _me = snakes.get(localPlayerId);
            if (_me && _me.network.current) {
              prediction.x     = _me.network.current.unwrappedX;
              prediction.y     = _me.network.current.unwrappedY;
              prediction.angle = _me.network.current.angle;
              prediction.active = true;
            }
          }
          break;
        case 'particleSpawn':
          if (Array.isArray(msg.events))
            msg.events.forEach(e => spawnParticles(e.x, e.y, e.color, e.n));
          else spawnParticles(msg.x, msg.y, msg.color, msg.n);
          break;
        case 'died':
          gameRunning = false;
          prediction.active = false;
          document.getElementById('death-screen').style.display = 'flex';
          document.getElementById('death-score').textContent = `Final score: ${msg.score}`;
          break;
      }
    }

    connectToRoom();

    // ─── CANVAS SETUP ─────────────────────────────────────────
    const canvas  = document.getElementById('game');
    const ctx     = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const mmCanvas = document.getElementById('mm-canvas');
    const mmCtx   = mmCanvas.getContext('2d', { desynchronized: true });

    // ─── CONSTANTS ────────────────────────────────────────────
    const SKINS = [
      { name:'Coconut',      body:'#5fbf6a', glow:'#8bd39a', head:'#2f6f46', eye:'#fef9e8' },
      { name:'Leaf',         body:'#7ed957', glow:'#9ff06f', head:'#3f7d2b', eye:'#fef9e8' },
      { name:'Lotus',        body:'#d67a52', glow:'#f3a96d', head:'#8c4b2d', eye:'#fff7df' },
      { name:'Temple Gold',  body:'#d8a93a', glow:'#f0cb72', head:'#8f6517', eye:'#1d1808' },
      { name:'Monsoon',      body:'#4bb48c', glow:'#73d0ab', head:'#236b56', eye:'#f3f8ef' },
      { name:'Paddy',        body:'#95c94d', glow:'#c2ea6a', head:'#55751d', eye:'#fffce6' },
      { name:'Spice',        body:'#c96d34', glow:'#e2a15a', head:'#7f3d17', eye:'#fff6e0' },
      { name:'Backwater',    body:'#3aa680', glow:'#67cfa7', head:'#16614b', eye:'#eefcf7' },
    ];

    // Detect touch properly
    const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    const MAX_TRAIL_POINTS    = 140;
    const SNAKE_CULL_MARGIN   = 280;
    const ORB_CULL_MARGIN     = 48;
    const INPUT_SEND_MS       = 40;
    const INTERPOLATION_BACK  = 80;

    // ── Client-side prediction ──────────────────────────────────────
    const prediction = {
      x: 0, y: 0,
      angle: 0,
      speed: 2.2,
      reconcileK: 0.18,
      active: false,
    };
    const JOYSTICK_RADIUS     = 68; // virtual joystick outer radius
    const JOYSTICK_KNOB       = 26; // knob radius

    let WORLD        = 4000;
    let serverTickMs = 72;
    let localPlayerId  = null;
    let selectedSkin   = 0;
    let gameRunning    = false;
    let lastFrameTime  = performance.now();
    let lastInputSentAt= 0;
    let lastHudAt      = 0;
    let lastMMAt       = 0;
    let lastFpsAt      = performance.now();
    let fpsFrames      = 0;
    let averageFps     = 60;
    let scoreboard     = [];
    let selfState      = {};

    const snakes    = new Map();
    let   orbs      = [];
    let   particles = [];

    const quality = {
      renderScale:    IS_TOUCH ? 0.8 : 1,
      orbBudget:      IS_TOUCH ? 50  : 100,
      trailStep:      IS_TOUCH ? 2   : 1,
      trailCap:       IS_TOUCH ? 85  : MAX_TRAIL_POINTS,
      mmIntervalMs:   IS_TOUCH ? 200 : 100,
      showNames:      !IS_TOUCH,
    };

    let bgPattern = null;
    const camera  = { x: 0, y: 0 };

    // ─── POINTER / TOUCH STATE ────────────────────────────────
    // Slither.io model:
    //   Desktop: mouse position = aim direction
    //   Mobile:  left-zone joystick = aim; right boost button = boost
    const pointer = {
      // World-relative aim: screen centre + offset
      aimDX: 0,  // pixel offset from screen centre
      aimDY: 0,
      boosting: false,

      // Joystick tracking (touch)
      joy: {
        active: false,
        id: null,
        anchorX: 0,
        anchorY: 0,
        dx: 0,   // clamped joystick offset
        dy: 0,
      },
      // Boost button tracking
      boostTouchId: null,
    };

    // Computed screen position used by sendInput
    function getPointerScreenXY() {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      return { x: cx + pointer.aimDX, y: cy + pointer.aimDY };
    }

    // ─── CANVAS RESIZE ────────────────────────────────────────
    let bgPatternDirty = true;

    function resizeCanvas() {
      const dprRaw = window.devicePixelRatio || 1;
      // Cap DPR: mobile max 2, desktop max 1.5
      const dprCap = IS_TOUCH ? Math.min(dprRaw, 2) : Math.min(dprRaw, 1.5);
      const dpr    = Math.max(0.6, dprCap * quality.renderScale);

      canvas.width  = Math.round(window.innerWidth  * dpr);
      canvas.height = Math.round(window.innerHeight * dpr);
      canvas.style.width  = `${window.innerWidth}px`;
      canvas.style.height = `${window.innerHeight}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      bgPatternDirty = true;
    }

    function ensureBgPattern() {
      if (!bgPatternDirty && bgPattern) return;
      const tile = document.createElement('canvas');
      tile.width = 48; tile.height = 48;
      const tc = tile.getContext('2d');
      tc.fillStyle = 'rgba(240,203,114,0.06)';
      [[8,8],[28,16],[16,32],[38,38]].forEach(([x,y]) => tc.fillRect(x,y,2,2));
      bgPattern = ctx.createPattern(tile, 'repeat');
      bgPatternDirty = false;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ─── SKIN PICKER ──────────────────────────────────────────
    const picker = document.getElementById('skin-picker');
    SKINS.forEach((skin, idx) => {
      const opt = document.createElement('div');
      opt.className = 'skin-opt' + (idx === 0 ? ' selected' : '');
      opt.style.background  = skin.body;
      opt.style.boxShadow   = `0 0 14px ${skin.glow}66`;
      opt.addEventListener('pointerdown', () => {
        selectedSkin = idx;
        try { localStorage.setItem('slither_skin', idx); } catch(e) {}
        document.querySelectorAll('.skin-opt').forEach((n,i) => n.classList.toggle('selected', i === idx));
      });
      picker.appendChild(opt);
    });

    // ─── HELPERS ──────────────────────────────────────────────
    const vw = () => window.innerWidth;
    const vh = () => window.innerHeight;

    function wrapCoord(v)             { return ((v % WORLD) + WORLD) % WORLD; }
    function shortDelta(from, to) {
      let d = (to - from) % WORLD;
      if (d >  WORLD/2) d -= WORLD;
      else if (d < -WORLD/2) d += WORLD;
      return d;
    }
    function unwrapPos(prev, next) {
      if (!prev) return { x: next.x, y: next.y };
      return {
        x: prev.x + shortDelta(wrapCoord(prev.x), next.x),
        y: prev.y + shortDelta(wrapCoord(prev.y), next.y),
      };
    }
    function lerp(a,b,t)      { return a + (b-a)*t; }
    function angleLerp(a,b,t) {
      let d = b-a;
      while (d >  Math.PI) d -= Math.PI*2;
      while (d < -Math.PI) d += Math.PI*2;
      return a + d*t;
    }
    function clamp(v,lo,hi)   { return Math.max(lo, Math.min(hi, v)); }
    function snakeRadius(len) { return Math.min(32, 18 + len/60); }

    function toScreen(wx, wy) {
      return {
        x: vw()/2 + shortDelta(camera.x, wx),
        y: vh()/2 + shortDelta(camera.y, wy),
      };
    }

    function vpBounds(margin=0) {
      return { left:-margin, top:-margin, right:vw()+margin, bottom:vh()+margin };
    }

    function onScreen(sx, sy, b) {
      return sx>=b.left && sx<=b.right && sy>=b.top && sy<=b.bottom;
    }

    // ─── SNAKE MANAGEMENT ─────────────────────────────────────
    function ensureSnake(snap, isPlayer) {
      const now = performance.now();
      let s = snakes.get(snap.id);
      if (!s) {
        const init = {
          x:snap.x, y:snap.y, unwrappedX:snap.x, unwrappedY:snap.y,
          angle:snap.angle, length:snap.length, receivedAt:now
        };
        s = {
          id:snap.id, name:snap.name, skinIdx:snap.skinIdx, isPlayer,
          network:{previous:init, current:init},
          trail:[{x:snap.x,y:snap.y}],
          render:{x:snap.x,y:snap.y,angle:snap.angle,length:snap.length},
          lastSeenAt:now,
        };
        snakes.set(snap.id, s);
        return s;
      }
      const pc = s.network.current;
      const uw = unwrapPos({x:pc.unwrappedX,y:pc.unwrappedY},{x:snap.x,y:snap.y});
      s.name=snap.name; s.skinIdx=snap.skinIdx; s.isPlayer=isPlayer;
      s.network.previous = pc;
      s.network.current  = {
        x:snap.x, y:snap.y, unwrappedX:uw.x, unwrappedY:uw.y,
        angle:snap.angle, length:snap.length, receivedAt:now,
      };
      s.lastSeenAt = now;
      return s;
    }

    function reconcileSnakes(players, bots) {
      const live = new Set();
      players.forEach(s => { live.add(s.id); ensureSnake(s,true);  });
      bots.forEach(s    => { live.add(s.id); ensureSnake(s,false); });
      for (const [id] of snakes) {
        if (!live.has(id) && id !== localPlayerId) snakes.delete(id);
        if (!live.has(id) && id === localPlayerId && !gameRunning) snakes.delete(id);
      }
    }

    function getRenderedSnake(id, renderTime) {
      const s = snakes.get(id);
      if (!s || !s.network.current) return null;
      const prev = s.network.previous || s.network.current;
      const cur  = s.network.current;
      const dur  = Math.max(1, cur.receivedAt - prev.receivedAt || serverTickMs);
      const t    = clamp((renderTime - prev.receivedAt) / dur, 0, 1.2);
      return {
        id:s.id, name:s.name, skinIdx:s.skinIdx,
        x:     lerp(prev.unwrappedX, cur.unwrappedX, t),
        y:     lerp(prev.unwrappedY, cur.unwrappedY, t),
        angle: angleLerp(prev.angle, cur.angle, t),
        length:lerp(prev.length, cur.length, t),
        radius:snakeRadius(cur.length),
        isLocal:s.id === localPlayerId,
      };
    }

    // ─── PARTICLES ────────────────────────────────────────────
    function spawnParticles(x, y, color, count) {
      const n = Math.max(1, Math.ceil(count * (IS_TOUCH ? 0.35 : 0.6)));
      for (let i=0; i<n; i++) {
        const a = Math.random()*Math.PI*2;
        const sp= 1+Math.random()*4;
        particles.push({
          x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
          r:2+Math.random()*4, color, life:1,
          decay:0.03+Math.random()*0.04,
        });
      }
    }

    // ─── ADAPTIVE QUALITY ─────────────────────────────────────
    function updateQuality(now) {
      fpsFrames++;
      if (now - lastFpsAt < 900) return;
      averageFps = (fpsFrames * 1000) / (now - lastFpsAt);
      fpsFrames = 0; lastFpsAt = now;

      let nextScale = quality.renderScale;
      if (averageFps < 40) nextScale = Math.max(IS_TOUCH ? 0.55 : 0.7, nextScale - 0.07);
      else if (averageFps > 55) nextScale = Math.min(IS_TOUCH ? 0.9 : 1, nextScale + 0.03);

      quality.orbBudget = averageFps < 40 ? (IS_TOUCH ? 28 : 60) : (IS_TOUCH ? 50 : 100);
      quality.trailStep = averageFps < 40 ? (IS_TOUCH ? 4 : 2)   : (IS_TOUCH ? 2 : 1);
      quality.trailCap  = averageFps < 40 ? (IS_TOUCH ? 50 : 100) : (IS_TOUCH ? 85 : MAX_TRAIL_POINTS);

      if (Math.abs(nextScale - quality.renderScale) >= 0.04) {
        quality.renderScale = nextScale;
        resizeCanvas();
      }
    }

    // ─── TRAIL UPDATES ────────────────────────────────────────
    function updateTrails(renderTime) {
      for (const s of snakes.values()) {
        const isLocal = (s.id === localPlayerId && prediction.active);
        let r;
        
        if (isLocal) {
          // Use instant local prediction for zero visual lag
          r = {
            x: prediction.x,
            y: prediction.y,
            angle: prediction.angle,
            length: s.network.current ? s.network.current.length : 10
          };
        } else {
          // Use interpolated server snapshots for other players
          r = getRenderedSnake(s.id, renderTime);
        }

        if (!r) continue;
        s.render = { x:r.x, y:r.y, angle:r.angle, length:r.length };
        
        const trail = s.trail;
        
        // Ensure the very last point is always exactly at the snake's head
        trail[trail.length-1] = { x: r.x, y: r.y };
        
        // Only drop a new permanent trail joint if we've moved far enough from the second-to-last joint
        if (trail.length >= 2) {
          const prev = trail[trail.length - 2];
          const dx = r.x - prev.x, dy = r.y - prev.y;
          if (dx*dx + dy*dy > 16) trail.push({ x: r.x, y: r.y });
        } else {
          trail.push({ x: r.x, y: r.y });
        }
        
        const maxLen = Math.max(18, Math.ceil(r.length) + 12);
        while (trail.length > Math.min(quality.trailCap, maxLen)) trail.shift();
      }
    }

    // ── Client-side prediction step ─────────────────────────────────────────
    function stepPrediction(deltaMs) {
      if (!prediction.active || !localPlayerId) return;
      const me = snakes.get(localPlayerId);
      if (!me || !me.network.current) return;

      const dt = Math.min(deltaMs, 50) / 16.67; // normalise to 60fps frames

      // Steer predicted angle toward aim direction
      // User's aimDX/aimDY is world-relative aim, works for both desktop and mobile
      let targetAngle = prediction.angle;
      if (Math.abs(pointer.aimDX) > 4 || Math.abs(pointer.aimDY) > 4 || !IS_TOUCH) {
        targetAngle = Math.atan2(pointer.aimDY, pointer.aimDX || 0.0001);
      }

      let diff = targetAngle - prediction.angle;
      while (diff > Math.PI)  diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      prediction.angle += Math.min(Math.abs(diff), 0.10 * dt) * Math.sign(diff);

      // Move forward
      const spd = (pointer.boosting ? prediction.speed * 1.75 : prediction.speed) * dt;
      prediction.x += Math.cos(prediction.angle) * spd;
      prediction.y += Math.sin(prediction.angle) * spd;

      // Soft reconcile toward authoritative server position
      const srv = me.network.current;
      const dx = srv.unwrappedX - prediction.x;
      const dy = srv.unwrappedY - prediction.y;
      const dist = Math.hypot(dx, dy);

      if (dist > 0.1) {
        // Dynamic lerp: smooth when close (0.04), faster when far (up to 0.6)
        // This prevents snapping while ensuring we don't drift too far
        const dynamicK = Math.min(0.6, 0.04 + (dist * 0.002));
        const k = 1 - Math.pow(1 - dynamicK, dt);
        prediction.x += dx * k;
        prediction.y += dy * k;
      }
    }

    // ─── CAMERA ───────────────────────────────────────────────
    function updateCamera() {
      const me = localPlayerId ? snakes.get(localPlayerId) : null;
      if (!me) return;
      
      const cx = (prediction.active ? prediction.x : (me.render ? me.render.x : camera.x));
      const cy = (prediction.active ? prediction.y : (me.render ? me.render.y : camera.y));
      
      camera.x += (cx - camera.x) * 0.14;
      camera.y += (cy - camera.y) * 0.14;
    }

    // ─── INPUT ────────────────────────────────────────────────
    function sendInput(now) {
      if (!gameRunning || !localPlayerId) return;
      if (now - lastInputSentAt < INPUT_SEND_MS) return;

      const pos   = getPointerScreenXY();
      const dx    = pos.x - vw()/2;
      const dy    = pos.y - vh()/2;
      const angle = Math.atan2(dy, dx || 0.0001);
      wsSend('input', { angle, boosting: pointer.boosting });
      lastInputSentAt = now;
    }

    // ─── DRAW BACKGROUND ──────────────────────────────────────
    function drawBackground() {
      const w = vw(), h = vh();
      const g = ctx.createLinearGradient(0,0,0,h);
      g.addColorStop(0,   '#163924');
      g.addColorStop(0.45,'#0d291a');
      g.addColorStop(1,   '#06120c');
      ctx.fillStyle = g;
      ctx.fillRect(0,0,w,h);

      ensureBgPattern();
      ctx.save();
      ctx.translate(((-camera.x)%48+48)%48, ((-camera.y)%48+48)%48);
      ctx.fillStyle = bgPattern;
      ctx.globalAlpha = IS_TOUCH ? 0.45 : 0.9;
      ctx.fillRect(-48,-48,w+96,h+96);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // ─── DRAW ORBS ────────────────────────────────────────────
    function getVisibleOrbs(renderTime, bounds) {
      const list = [];
      for (const orb of orbs) {
        const s = toScreen(orb.x, orb.y);
        if (!onScreen(s.x,s.y,bounds)) continue;
        list.push({
          orb, sx:s.x, sy:s.y,
          r: orb.r + Math.sin((orb.pulse||0) + renderTime*0.006) * 1.2,
        });
      }
      if (list.length > quality.orbBudget) {
        const cx=vw()/2, cy=vh()/2;
        list.sort((a,b)=>(a.sx-cx)**2+(a.sy-cy)**2-(b.sx-cx)**2-(b.sy-cy)**2);
        list.length = quality.orbBudget;
      }
      return list;
    }

    function drawOrbs(list) {
      for (const {orb,sx,sy,r} of list) {
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI*2);
        ctx.fillStyle = orb.color;
        if (!IS_TOUCH) { ctx.shadowColor=orb.color; ctx.shadowBlur=10; }
        ctx.fill();
        if (!IS_TOUCH) {
          ctx.shadowBlur=0;
          ctx.beginPath();
          ctx.arc(sx-r*0.24, sy-r*0.24, r*0.28, 0, Math.PI*2);
          ctx.fillStyle='rgba(255,255,255,0.55)';
          ctx.fill();
        }
      }
      ctx.shadowBlur=0;
    }

    // ─── DRAW PARTICLES ───────────────────────────────────────
    function drawParticles(bounds) {
      ctx.shadowBlur=0;
      for (const p of particles) {
        const s = toScreen(p.x, p.y);
        if (!onScreen(s.x,s.y,bounds)) continue;
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(s.x,s.y,p.r,0,Math.PI*2);
        ctx.fillStyle = p.color;
        if (!IS_TOUCH) { ctx.shadowColor=p.color; ctx.shadowBlur=6; }
        ctx.fill();
      }
      ctx.globalAlpha=1; ctx.shadowBlur=0;
    }

    function updateParticles(ds) {
      for (let i=particles.length-1;i>=0;i--) {
        const p=particles[i];
        p.x+=p.vx*ds; p.y+=p.vy*ds;
        p.vx*=0.96; p.vy*=0.96;
        p.life-=p.decay*ds;
        if (p.life<=0) particles.splice(i,1);
      }
    }

    // ─── DRAW SNAKES ──────────────────────────────────────────
    function getVisibleSnakes() {
      const b = vpBounds(SNAKE_CULL_MARGIN);
      const list = [];
      for (const s of snakes.values()) {
        if (!s.render) continue;
        const h = toScreen(s.render.x, s.render.y);
        if (!onScreen(h.x,h.y,b)) continue;
        list.push(s);
      }
      list.sort((a,b)=>(a.render.length||0)-(b.render.length||0));
      return list;
    }

    function drawSnake(s) {
      const skin  = SKINS[s.skinIdx] || SKINS[0];
      const trail = s.trail;
      const r     = snakeRadius(s.render.length || s.network.current.length);

      if (trail.length > 1) {
        ctx.beginPath();
        const first = toScreen(trail[0].x, trail[0].y);
        ctx.moveTo(first.x, first.y);

        if (IS_TOUCH) {
          for (let i=quality.trailStep; i<trail.length; i+=quality.trailStep) {
            const p = toScreen(trail[i].x, trail[i].y);
            ctx.lineTo(p.x, p.y);
          }
        } else {
          for (let i=quality.trailStep; i<trail.length; i+=quality.trailStep) {
            const prev = toScreen(trail[Math.max(0,i-quality.trailStep)].x, trail[Math.max(0,i-quality.trailStep)].y);
            const cur  = toScreen(trail[i].x, trail[i].y);
            ctx.quadraticCurveTo(prev.x, prev.y, (cur.x+prev.x)/2, (cur.y+prev.y)/2);
          }
        }

        ctx.strokeStyle=skin.body; ctx.lineWidth=r*2;
        ctx.lineCap='round'; ctx.lineJoin='round';
        if (!IS_TOUCH && s.id === localPlayerId) { ctx.shadowColor=skin.glow; ctx.shadowBlur=16; }
        ctx.stroke();
        ctx.strokeStyle='rgba(255,255,255,0.13)'; ctx.lineWidth=r*0.9;
        ctx.shadowBlur=0; ctx.stroke();
      }

      const head = toScreen(s.render.x, s.render.y);
      ctx.beginPath();
      ctx.arc(head.x,head.y,r*1.18,0,Math.PI*2);
      ctx.fillStyle=skin.head;
      if (!IS_TOUCH && s.id === localPlayerId) { ctx.shadowColor=skin.glow; ctx.shadowBlur=12; }
      ctx.fill(); ctx.shadowBlur=0;

      const a=s.render.angle;
      const eOff=r*0.55, eR=r*0.3;
      const px=-Math.sin(a), py=Math.cos(a);
      const fx=Math.cos(a)*r*0.32, fy=Math.sin(a)*r*0.32;
      for (const side of [-1,1]) {
        const ex=head.x+fx+px*eOff*side, ey=head.y+fy+py*eOff*side;
        ctx.beginPath(); ctx.arc(ex,ey,eR,0,Math.PI*2);
        ctx.fillStyle=skin.eye; ctx.fill();
        ctx.beginPath(); ctx.arc(ex+Math.cos(a)*eR*0.3, ey+Math.sin(a)*eR*0.3, eR*0.42, 0, Math.PI*2);
        ctx.fillStyle='#111'; ctx.fill();
      }

      if (quality.showNames || s.id===localPlayerId) {
        ctx.font=`bold ${Math.max(11,r)}px Trebuchet MS`;
        ctx.textAlign='center';
        ctx.fillStyle='rgba(0,0,0,0.45)';
        ctx.fillText(s.name, head.x+1, head.y-r*2.15+1);
        ctx.fillStyle='#fffaf0';
        ctx.fillText(s.name, head.x, head.y-r*2.15);
      }
    }

    // ─── DRAW JOYSTICK (mobile) ───────────────────────────────
    function drawJoystick() {
      if (!IS_TOUCH || !pointer.joy.active) return;
      const { anchorX:ax, anchorY:ay, dx, dy } = pointer.joy;

      ctx.save();

      // Outer ring
      ctx.beginPath();
      ctx.arc(ax, ay, JOYSTICK_RADIUS, 0, Math.PI*2);
      ctx.fillStyle   = 'rgba(7,21,14,0.32)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(240,203,114,0.22)';
      ctx.lineWidth   = 2;
      ctx.stroke();

      // Direction line
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(ax+dx, ay+dy);
      ctx.strokeStyle = 'rgba(240,203,114,0.18)';
      ctx.lineWidth   = 1.5;
      ctx.stroke();

      // Knob
      const kx = ax+dx, ky = ay+dy;
      ctx.beginPath();
      ctx.arc(kx, ky, JOYSTICK_KNOB, 0, Math.PI*2);
      ctx.fillStyle = pointer.boosting
        ? 'rgba(216,169,58,0.75)'
        : 'rgba(126,217,87,0.68)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth   = 1.5;
      ctx.stroke();

      // Centre dot
      ctx.beginPath();
      ctx.arc(ax, ay, 4, 0, Math.PI*2);
      ctx.fillStyle='rgba(240,203,114,0.4)';
      ctx.fill();

      ctx.restore();
    }

    // ─── CURSOR (desktop) ─────────────────────────────────────
    function drawCursor() {
      if (IS_TOUCH) return;
      const pos = getPointerScreenXY();
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 6, 0, Math.PI*2);
      ctx.strokeStyle='rgba(255,255,255,0.8)';
      ctx.lineWidth=1.5; ctx.stroke();
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 2, 0, Math.PI*2);
      ctx.fillStyle='#fff'; ctx.fill();
    }

    // ─── MINIMAP ──────────────────────────────────────────────
    function drawMinimap(now) {
      if (now - lastMMAt < quality.mmIntervalMs) return;
      lastMMAt = now;
      const size = mmCanvas.width;
      mmCtx.clearRect(0,0,size,size);
      mmCtx.save();
      mmCtx.beginPath(); mmCtx.arc(size/2,size/2,size/2,0,Math.PI*2); mmCtx.clip();

      const bg = mmCtx.createLinearGradient(0,0,0,size);
      bg.addColorStop(0,'rgba(20,61,39,0.93)'); bg.addColorStop(1,'rgba(7,21,14,0.97)');
      mmCtx.fillStyle=bg; mmCtx.fillRect(0,0,size,size);

      const scale = size/WORLD;
      const step  = IS_TOUCH ? 10 : 6;
      for (let i=0;i<orbs.length;i+=step) {
        const o=orbs[i]; if(!o) continue;
        mmCtx.beginPath(); mmCtx.arc(o.x*scale,o.y*scale,1.3,0,Math.PI*2);
        mmCtx.fillStyle=o.color+'88'; mmCtx.fill();
      }

      for (const s of snakes.values()) {
        if (!s.render) continue;
        const sx=wrapCoord(s.render.x)*scale, sy=wrapCoord(s.render.y)*scale;
        const isMe = s.id===localPlayerId;
        mmCtx.beginPath();
        mmCtx.arc(sx, sy, isMe ? 3.5 : 2.2, 0, Math.PI*2);
        mmCtx.fillStyle = isMe ? '#fff7df' : (SKINS[s.skinIdx]||SKINS[0]).body;
        if (!IS_TOUCH && isMe) { mmCtx.shadowColor='#fff7df'; mmCtx.shadowBlur=6; }
        mmCtx.fill(); mmCtx.shadowBlur=0;
      }
      mmCtx.restore();
    }

    // ─── HUD UPDATE ───────────────────────────────────────────
    function updateHUD(now) {
      if (now - lastHudAt < (IS_TOUCH ? 200 : 120)) return;
      lastHudAt = now;

      const me = selfState[localPlayerId] || { rank:0, score:0, boostE:0 };
      document.getElementById('rank-val').textContent  = me.rank ? `#${me.rank}` : '#-';
      document.getElementById('score-val').textContent = me.score || 0;
      document.getElementById('boost-fill').style.width =
        `${clamp((me.boostE||0)*100,0,100)}%`;

      // Desktop leaderboard
      const lbList = document.getElementById('lb-list');
      lbList.innerHTML='';
      scoreboard.forEach((e,i) => {
        const row=document.createElement('div');
        row.className='lb-row'+(e.id===localPlayerId?' me':'');
        row.innerHTML=`<span class="lb-name">${i+1}. ${e.name}</span><span>${e.score}</span>`;
        lbList.appendChild(row);
      });

      // Mobile leaderboard
      const mlbList = document.getElementById('mobile-lb-list');
      mlbList.innerHTML='';
      scoreboard.slice(0,5).forEach((e,i) => {
        const row=document.createElement('div');
        row.className='lb-row'+(e.id===localPlayerId?' me':'');
        row.innerHTML=`<span class="lb-name">${i+1}. ${e.name}</span><span>${e.score}</span>`;
        mlbList.appendChild(row);
      });
    }

    // ─── GAME LOOP ────────────────────────────────────────────
    function gameLoop(now) {
      if (!gameRunning) return;
      requestAnimationFrame(gameLoop);

      const deltaMs    = Math.min(now - lastFrameTime, 100);
      lastFrameTime    = now;
      const ds         = deltaMs / 16.667;
      const renderTime = now - INTERPOLATION_BACK;

      updateQuality(now);
      stepPrediction(deltaMs);
      updateTrails(renderTime);
      updateCamera();
      sendInput(now);
      updateParticles(ds);

      const orbBounds  = vpBounds(ORB_CULL_MARGIN);
      const partBounds = vpBounds(24);
      const visOrbs    = getVisibleOrbs(renderTime, orbBounds);
      const visSnakes  = getVisibleSnakes();

      drawBackground();
      drawOrbs(visOrbs);
      drawParticles(partBounds);
      visSnakes.forEach(drawSnake);
      drawJoystick();
      drawCursor();
      drawMinimap(now);
      updateHUD(now);
    }

    // ─── START GAME ───────────────────────────────────────────
    function startGame() {
      const name = document.getElementById('name-input').value.trim() || 'Player';
      document.getElementById('menu').style.display        = 'none';
      document.getElementById('death-screen').style.display= 'none';

      pointer.joy = { active:false, id:null, anchorX:0, anchorY:0, dx:0, dy:0 };
      pointer.aimDX = 0; pointer.aimDY = 0;
      pointer.boosting = false; pointer.boostTouchId = null;

      const tryJoin = () => {
        if (ws && ws.readyState === WebSocket.OPEN)
          wsSend('join', { name, skinIdx: selectedSkin });
        else setTimeout(tryJoin, 100);
      };

      if (!ws || ws.readyState===WebSocket.CLOSED || ws.readyState===WebSocket.CLOSING) {
        connectToRoom(); setTimeout(tryJoin, 200);
      } else tryJoin();

      if (!gameRunning) {
        gameRunning   = true;
        lastFrameTime = performance.now();
        requestAnimationFrame(gameLoop);
      }
    }

    // ─── DESKTOP MOUSE ────────────────────────────────────────
    document.addEventListener('mousemove', e => {
      pointer.aimDX = e.clientX - vw()/2;
      pointer.aimDY = e.clientY - vh()/2;
    });
    document.addEventListener('mousedown', e => { if(e.button===0) pointer.boosting=true; });
    document.addEventListener('mouseup',   e => { if(e.button===0) pointer.boosting=false; });
    document.addEventListener('keydown', e => { if(e.code==='Space'){ pointer.boosting=true; e.preventDefault(); }});
    document.addEventListener('keyup',   e => { if(e.code==='Space') pointer.boosting=false; });

    // ─── MOBILE TOUCH ─────────────────────────────────────────
    // Strategy (slither.io model):
    //   Any touch in left 55% of screen → joystick
    //   Boost button handles its own touch via pointerdown/up

    const boostBtn = document.getElementById('boost-btn');

    function isBoostBtnTouch(touch) {
      const r = boostBtn.getBoundingClientRect();
      return touch.clientX>=r.left && touch.clientX<=r.right
          && touch.clientY>=r.top  && touch.clientY<=r.bottom;
    }

    function handleTouchStart(e) {
      e.preventDefault();
      for (const touch of e.changedTouches) {
        // Boost button area
        if (isBoostBtnTouch(touch)) {
          pointer.boostTouchId = touch.identifier;
          pointer.boosting     = true;
          boostBtn.classList.add('active');
          continue;
        }
        // Left-zone joystick (only one active at a time)
        if (pointer.joy.id === null && touch.clientX < vw() * 0.60) {
          pointer.joy = {
            active:  true,
            id:      touch.identifier,
            anchorX: touch.clientX,
            anchorY: touch.clientY,
            dx: 0, dy: 0,
          };
          pointer.aimDX = 0;
          pointer.aimDY = 0;
        }
      }
    }

    function handleTouchMove(e) {
      e.preventDefault();
      for (const touch of e.changedTouches) {
        if (touch.identifier === pointer.joy.id) {
          const rawDX  = touch.clientX - pointer.joy.anchorX;
          const rawDY  = touch.clientY - pointer.joy.anchorY;
          const dist   = Math.hypot(rawDX, rawDY);
          const clampS = dist > JOYSTICK_RADIUS ? JOYSTICK_RADIUS / dist : 1;
          pointer.joy.dx = rawDX * clampS;
          pointer.joy.dy = rawDY * clampS;

          // Amplify for actual aim angle (2.8× gives good sensitivity)
          pointer.aimDX = rawDX * 2.8;
          pointer.aimDY = rawDY * 2.8;
        }
      }
    }

    function handleTouchEnd(e) {
      e.preventDefault();
      for (const touch of e.changedTouches) {
        if (touch.identifier === pointer.boostTouchId) {
          pointer.boostTouchId = null;
          pointer.boosting     = false;
          boostBtn.classList.remove('active');
        }
        if (touch.identifier === pointer.joy.id) {
          pointer.joy = { active:false, id:null, anchorX:0, anchorY:0, dx:0, dy:0 };
          pointer.aimDX = 0;
          pointer.aimDY = 0;
        }
      }
    }

    // Attach to canvas for joystick; document catches boost button
    canvas.addEventListener('touchstart',  handleTouchStart,  { passive:false });
    canvas.addEventListener('touchmove',   handleTouchMove,   { passive:false });
    canvas.addEventListener('touchend',    handleTouchEnd,    { passive:false });
    canvas.addEventListener('touchcancel', handleTouchEnd,    { passive:false });

    // Boost button also needs its own touch (in case touch starts on it)
    boostBtn.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      pointer.boostTouchId = e.changedTouches[0]?.identifier ?? null;
      pointer.boosting = true;
      boostBtn.classList.add('active');
    }, { passive:false });

    boostBtn.addEventListener('touchend', e => {
      e.preventDefault(); e.stopPropagation();
      pointer.boosting = false;
      pointer.boostTouchId = null;
      boostBtn.classList.remove('active');
    }, { passive:false });

    boostBtn.addEventListener('touchcancel', e => {
      pointer.boosting = false;
      pointer.boostTouchId = null;
      boostBtn.classList.remove('active');
    }, { passive:false });

    // ─── BUTTONS & INIT ───────────────────────────────────────
    document.getElementById('play-btn').addEventListener('click', startGame);
    document.getElementById('respawn-btn').addEventListener('click', startGame);

    // Local Storage Restore
    try {
      const savedSkin = parseInt(localStorage.getItem('slither_skin'));
      if (!isNaN(savedSkin) && savedSkin >= 0 && savedSkin < SKINS.length) {
        selectedSkin = savedSkin;
        document.querySelectorAll('.skin-opt').forEach((n,i) => n.classList.toggle('selected', i === selectedSkin));
      }
      const savedName = localStorage.getItem('slither_name');
      if (savedName) document.getElementById('name-input').value = savedName;
    } catch(e) {}

    document.getElementById('name-input').addEventListener('input', e => {
      try { localStorage.setItem('slither_name', e.target.value.trim()); } catch(e) {}
    });
  </script>
</body>
</html>
