<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
  <title>Slither Kerala Arena</title>
  <style>
    :root {
      --bg-deep:      #05100a;
      --bg-mid:       #0b2318;
      --bg-soft:      #163c22;
      --gold:         #d8a93a;
      --gold-soft:    #f0cb72;
      --leaf:         #7ed957;
      --leaf-soft:    #b9ee7d;
      --text:         #f8f4e8;
      --text-muted:   rgba(248,244,232,.70);
      --panel:        rgba(5,16,10,.80);
      --panel-border: rgba(240,203,114,.20);
      --safe-top:     env(safe-area-inset-top,    0px);
      --safe-right:   env(safe-area-inset-right,  0px);
      --safe-bottom:  env(safe-area-inset-bottom, 0px);
      --safe-left:    env(safe-area-inset-left,   0px);
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      position: fixed;
      touch-action: none;
      overscroll-behavior: none;
      background: var(--bg-deep);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    /* ── CANVAS ─────────────────────────────────────────────── */
    #gc {
      display: block;
      position: fixed;
      top: 0; left: 0;
      touch-action: none;
      image-rendering: auto;
    }

    /* ── HUD ─────────────────────────────────────────────────── */
    #ui {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* Shared badge style */
    .badge {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 16px;
    }

    /* Top-left: rank + score */
    #hud-tl {
      position: fixed;
      top: calc(12px + var(--safe-top));
      left: calc(12px + var(--safe-left));
      display: flex;
      gap: 8px;
    }

    .hud-badge {
      padding: 8px 14px;
      min-width: 66px;
    }

    .hud-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .hud-val {
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      color: var(--gold-soft);
    }

    /* Boost bar — top centre (desktop) */
    #boost-wrap {
      position: fixed;
      top: calc(12px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      border-radius: 999px;
      pointer-events: none;
    }

    #boost-wrap .lbl {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #boost-track {
      width: 108px; height: 6px;
      background: rgba(255,255,255,.10);
      border-radius: 999px;
      overflow: hidden;
    }

    #boost-fill {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, var(--leaf), var(--gold));
      border-radius: 999px;
      transform-origin: left;
      transition: transform .1s linear;
      /* use scaleX for cheap GPU transition */
    }

    /* Leaderboard — top right desktop */
    #lb {
      position: fixed;
      top: calc(12px + var(--safe-top));
      right: calc(12px + var(--safe-right));
      width: 196px;
      padding: 12px 14px;
      border-radius: 18px;
    }

    #lb h3 {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-soft);
      margin-bottom: 8px;
    }

    .lb-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 0;
      color: rgba(248,244,232,.82);
    }
    .lb-name { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 128px; }
    .lb-me   { color: var(--gold-soft); font-weight: 700; }

    /* Mobile compact leaderboard — right centre */
    #mlb {
      position: fixed;
      right: calc(8px + var(--safe-right));
      top: 50%;
      transform: translateY(-50%);
      width: 116px;
      padding: 8px 10px;
      border-radius: 14px;
      display: none;
      z-index: 5;
    }

    #mlb .lb-row { font-size: 10px; padding: 2px 0; }
    #mlb .lb-name { max-width: 72px; }

    /* Minimap */
    #mm-wrap {
      position: fixed;
      right: calc(12px + var(--safe-right));
      bottom: calc(12px + var(--safe-bottom));
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(240,203,114,.22);
      background: rgba(5,16,10,.72);
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
      width: 118px; height: 118px;
    }
    #mm { width: 118px; height: 118px; }

    /* ── MOBILE BOOST BUTTON ─────────────────────────────────── */
    #bst-btn {
      position: fixed;
      right: calc(20px + var(--safe-right));
      bottom: calc(140px + var(--safe-bottom));
      width: 70px; height: 70px;
      border-radius: 50%;
      background: rgba(5,16,10,.76);
      border: 2px solid rgba(216,169,58,.38);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
      pointer-events: all;
      z-index: 7;
      box-shadow: 0 4px 20px rgba(0,0,0,.34);
      transition: background .1s, border-color .1s, transform .08s;
    }
    #bst-btn.on {
      background: rgba(216,169,58,.30);
      border-color: var(--gold-soft);
      transform: scale(.93);
    }
    #bst-btn span {
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold-soft);
      font-weight: 700;
    }

    /* ── OVERLAY SCREENS ─────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 20;
      background:
        linear-gradient(180deg, rgba(3,11,7,.94), rgba(5,16,10,.97)),
        radial-gradient(circle at top, rgba(216,169,58,.12), transparent 35%);
    }

    .card {
      width: min(94vw, 400px);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(8,24,16,.90);
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 60px rgba(0,0,0,.40);
      text-align: center;
      animation: rise 380ms cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes rise {
      from { transform: translateY(22px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #menu h1 {
      font-size: clamp(44px, 12vw, 66px);
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--gold-soft);
      text-shadow: 0 0 32px rgba(216,169,58,.22);
      margin-bottom: 6px;
    }

    #menu p {
      color: var(--text-muted);
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
    }

    #name-inp {
      width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      color: var(--text);
      font-size: 17px;
      padding: 13px 18px;
      text-align: center;
      outline: none;
      margin-bottom: 18px;
      transition: border-color .15s;
    }
    #name-inp:focus { border-color: rgba(240,203,114,.46); }

    .skins-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    #skin-picker {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .sk {
      width: 42px; height: 42px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .14s, border-color .14s;
      position: relative;
    }
    .sk.sel { border-color: var(--gold-soft); transform: scale(1.14); }
    .sk::after {
      content: '';
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.50), transparent 62%);
      pointer-events: none;
    }

    .btn-primary {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 15px 20px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      color: #0e1f0e;
      background: linear-gradient(135deg, var(--gold-soft), var(--leaf-soft));
      box-shadow: 0 12px 30px rgba(126,217,87,.20);
      cursor: pointer;
      pointer-events: all;
      transition: transform .1s, box-shadow .1s;
    }
    .btn-primary:active { transform: scale(.97); box-shadow: none; }

    #death { display: none; }
    #death h2 {
      font-size: clamp(36px, 10vw, 52px);
      font-weight: 900;
      color: #f2b94d;
      margin-bottom: 10px;
    }
    #death-score {
      color: var(--text-muted);
      margin-bottom: 22px;
      font-size: 16px;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 820px) {
      #lb        { display: none; }
      #boost-wrap{ display: none; }
      #mlb       { display: block; }
      #bst-btn   { display: flex; }
      #mm-wrap   { width: 80px; height: 80px; right: calc(8px + var(--safe-right)); bottom: calc(8px + var(--safe-bottom)); }
      #mm        { width: 80px; height: 80px; }
      #hud-tl    { top: calc(8px + var(--safe-top)); left: calc(8px + var(--safe-left)); }
      .hud-val   { font-size: 17px; }
      #bst-btn   { right: calc(14px + var(--safe-right)); bottom: calc(96px + var(--safe-bottom)); }
    }

    @media (min-width: 821px) {
      #bst-btn { display: none !important; }
      #mlb     { display: none !important; }
    }
  </style>
</head>
<body>

  <canvas id="gc"></canvas>

  <!-- HUD -->
  <div id="ui">
    <div id="hud-tl">
      <div class="badge hud-badge"><div class="hud-lbl">Rank</div><div class="hud-val" id="v-rank">#-</div></div>
      <div class="badge hud-badge"><div class="hud-lbl">Score</div><div class="hud-val" id="v-score">0</div></div>
    </div>

    <div id="boost-wrap" class="badge">
      <span class="lbl">Boost</span>
      <div id="boost-track"><div id="boost-fill"></div></div>
    </div>

    <div id="lb" class="badge"><h3>Leaderboard</h3><div id="lb-list"></div></div>
    <div id="mlb" class="badge"><div id="mlb-list"></div></div>

    <div id="mm-wrap"><canvas id="mm" width="118" height="118"></canvas></div>
  </div>

  <!-- Mobile boost button -->
  <div id="bst-btn">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M13 3L21 13H16V23H10V13H5L13 3Z" fill="#f0cb72" opacity=".92"/>
    </svg>
    <span>BOOST</span>
  </div>

  <!-- Menu -->
  <div id="menu" class="overlay">
    <div class="card">
      <h1>SLITHER</h1>
      <p>Glide through a Kerala-inspired arena, gather glowing orbs, and outlast every rival.</p>
      <input id="name-inp" type="text" maxlength="16" placeholder="Enter your name" autocomplete="off">
      <div class="skins-lbl">Choose Skin</div>
      <div id="skin-picker"></div>
      <button id="play-btn" class="btn-primary">▶ Play</button>
    </div>
  </div>

  <!-- Death screen -->
  <div id="death" class="overlay">
    <div class="card">
      <h2>You Died</h2>
      <div id="death-score"></div>
      <button id="respawn-btn" class="btn-primary">Respawn</button>
    </div>
  </div>

<script>
'use strict';
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const MATCHMAKER  = 'https://slither-kerala.razikv-co-in.workers.dev';
const ROOMS       = ['backwaters','munnar','varkala','kovalam','thekkady'];
const INPUT_HZ    = 25;          // send input 25×/s
const INTERP_MS   = 80;          // render behind by 80ms for smoothness
const MAX_TRAIL   = 140;
const CULL_SNAKE  = 280;
const CULL_ORB    = 48;
const JOY_R       = 66;          // joystick radius
const JOY_KNOB    = 25;

const SKINS = [
  { name:'Coconut',     body:'#5fbf6a', glow:'#8bd39a', head:'#2f6f46', eye:'#fef9e8' },
  { name:'Leaf',        body:'#7ed957', glow:'#9ff06f', head:'#3f7d2b', eye:'#fef9e8' },
  { name:'Lotus',       body:'#d67a52', glow:'#f3a96d', head:'#8c4b2d', eye:'#fff7df' },
  { name:'Temple Gold', body:'#d8a93a', glow:'#f0cb72', head:'#8f6517', eye:'#1d1808' },
  { name:'Monsoon',     body:'#4bb48c', glow:'#73d0ab', head:'#236b56', eye:'#f3f8ef' },
  { name:'Paddy',       body:'#95c94d', glow:'#c2ea6a', head:'#55751d', eye:'#fffce6' },
  { name:'Spice',       body:'#c96d34', glow:'#e2a15a', head:'#7f3d17', eye:'#fff6e0' },
  { name:'Backwater',   body:'#3aa680', glow:'#67cfa7', head:'#16614b', eye:'#eefcf7' },
];

// ─────────────────────────────────────────────────────────────
// PLATFORM DETECT — done once, like original slither.io
// ─────────────────────────────────────────────────────────────
const ua        = navigator.userAgent;
const IS_MOBILE = /mobile|android|iphone|ipad|ipod/i.test(ua) || navigator.maxTouchPoints > 0;
const IS_IOS    = /iphone|ipad|ipod/i.test(ua);

// ─────────────────────────────────────────────────────────────
// CANVAS SETUP
// ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d', { alpha: false, desynchronized: true });
const mmCv   = document.getElementById('mm');
const mmCtx  = mmCv.getContext('2d', { desynchronized: true });

// ─────────────────────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────────────────────
let WORLD        = 4000;
let tickMs       = 72;
let ws           = null;
let myId         = null;
let selectedSkin = 0;
let running      = false;

let orbs       = [];
let scoreboard = [];
let selfState  = {};
let particles  = [];

const snakes   = new Map();

// ─────────────────────────────────────────────────────────────
// ADAPTIVE QUALITY — mirrors original slither.io pattern
// ─────────────────────────────────────────────────────────────
const Q = {
  scale:      IS_MOBILE ? 0.80 : 1.00,
  orbBudget:  IS_MOBILE ? 50   : 100,
  trailStep:  IS_MOBILE ? 2    : 1,
  trailCap:   IS_MOBILE ? 80   : MAX_TRAIL,
  mmMs:       IS_MOBILE ? 200  : 100,
  names:      !IS_MOBILE,
};

let fpsFrames = 0;
let avgFps    = 60;
let lastFpsAt = 0;

function updateQuality(now) {
  fpsFrames++;
  if (now - lastFpsAt < 900) return;
  avgFps    = fpsFrames * 1000 / (now - lastFpsAt);
  fpsFrames = 0;
  lastFpsAt = now;

  let ns = Q.scale;
  if (avgFps < 40) ns = Math.max(IS_MOBILE ? .55 : .70, ns - .07);
  else if (avgFps > 55) ns = Math.min(IS_MOBILE ? .90 : 1.00, ns + .03);

  if (avgFps < 40) {
    Q.orbBudget = IS_MOBILE ? 28 : 60;
    Q.trailStep = IS_MOBILE ? 4  : 2;
    Q.trailCap  = IS_MOBILE ? 50 : 100;
  } else {
    Q.orbBudget = IS_MOBILE ? 50 : 100;
    Q.trailStep = IS_MOBILE ? 2  : 1;
    Q.trailCap  = IS_MOBILE ? 80 : MAX_TRAIL;
  }

  if (Math.abs(ns - Q.scale) >= .04) { Q.scale = ns; resizeCanvas(); }
}

// ─────────────────────────────────────────────────────────────
// CANVAS RESIZE
// ─────────────────────────────────────────────────────────────
let bgPat      = null;
let bgDirty    = true;

function resizeCanvas() {
  const dpr = Math.max(.6, Math.min(IS_MOBILE ? 2 : 1.5, devicePixelRatio || 1) * Q.scale);
  canvas.width  = Math.round(innerWidth  * dpr);
  canvas.height = Math.round(innerHeight * dpr);
  canvas.style.width  = innerWidth  + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  bgDirty = true;
}

function ensureBgPat() {
  if (!bgDirty && bgPat) return;
  const tile = document.createElement('canvas');
  tile.width = tile.height = 48;
  const tc = tile.getContext('2d');
  tc.fillStyle = 'rgba(240,203,114,.05)';
  [[8,8],[28,16],[16,32],[38,38]].forEach(([x,y]) => tc.fillRect(x,y,2,2));
  bgPat  = ctx.createPattern(tile, 'repeat');
  bgDirty = false;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas, { passive: true });

// ─────────────────────────────────────────────────────────────
// MATH HELPERS
// ─────────────────────────────────────────────────────────────
const PI2 = Math.PI * 2;
const vw  = () => innerWidth;
const vh  = () => innerHeight;

function wrapCoord(v)        { return ((v % WORLD) + WORLD) % WORLD; }
function shortDelta(a, b)   { let d = b - a; if (d > WORLD/2) d -= WORLD; if (d < -WORLD/2) d += WORLD; return d; }
function lerp(a, b, t)      { return a + (b - a) * t; }
function clamp(v, lo, hi)   { return v < lo ? lo : v > hi ? hi : v; }
function snakeR(len)         { return Math.min(32, 18 + len / 60); }

function unwrapPos(prev, next) {
  if (!prev) return { x: next.x, y: next.y };
  return {
    x: prev.x + shortDelta(wrapCoord(prev.x), next.x),
    y: prev.y + shortDelta(wrapCoord(prev.y), next.y),
  };
}

function angleLerp(a, b, t) {
  let d = b - a;
  while (d >  Math.PI) d -= PI2;
  while (d < -Math.PI) d += PI2;
  return a + d * t;
}

function toScreen(wx, wy) {
  return {
    x: vw() / 2 + shortDelta(cam.x, wrapCoord(wx)),
    y: vh() / 2 + shortDelta(cam.y, wrapCoord(wy)),
  };
}

function vpBounds(m) { return { l: -m, t: -m, r: vw() + m, b: vh() + m }; }
function onVP(sx, sy, b) { return sx >= b.l && sx <= b.r && sy >= b.t && sy <= b.b; }

// ─────────────────────────────────────────────────────────────
// CAMERA
// ─────────────────────────────────────────────────────────────
const cam = { x: 0, y: 0 };

function updateCamera() {
  const me = myId ? snakes.get(myId) : null;
  if (!me) return;
  const tx = pred.on ? pred.x : (me.r ? me.r.x : cam.x);
  const ty = pred.on ? pred.y : (me.r ? me.r.y : cam.y);
  cam.x += (tx - cam.x) * .14;
  cam.y += (ty - cam.y) * .14;
}

// ─────────────────────────────────────────────────────────────
// CLIENT-SIDE PREDICTION (reduces perceived latency)
// ─────────────────────────────────────────────────────────────
const pred = { x: 0, y: 0, ang: 0, spd: 2.2, on: false };

function stepPrediction(dt) {
  if (!pred.on || !myId) return;
  const me = snakes.get(myId);
  if (!me || !me.net.cur) return;

  const f = Math.min(dt, 50) / 16.67;

  // Steer toward aim
  let tgt = pred.ang;
  if (Math.abs(inp.dx) > 4 || Math.abs(inp.dy) > 4 || !IS_MOBILE)
    tgt = Math.atan2(inp.dy, inp.dx || 1e-4);

  let diff = tgt - pred.ang;
  while (diff >  Math.PI) diff -= PI2;
  while (diff < -Math.PI) diff += PI2;
  pred.ang += Math.min(Math.abs(diff), .10 * f) * Math.sign(diff);

  // Advance
  const spd = (inp.boost ? pred.spd * 1.75 : pred.spd) * f;
  pred.x   += Math.cos(pred.ang) * spd;
  pred.y   += Math.sin(pred.ang) * spd;

  // Reconcile with server
  const s  = me.net.cur;
  const dx = s.ux - pred.x;
  const dy = s.uy - pred.y;
  const d  = Math.hypot(dx, dy);
  if (d > .1) {
    const k = 1 - Math.pow(1 - Math.min(.6, .04 + d * .002), f);
    pred.x += dx * k;
    pred.y += dy * k;
  }
}

// ─────────────────────────────────────────────────────────────
// INPUT STATE
// ─────────────────────────────────────────────────────────────
const inp = {
  dx: 0, dy: 0,   // aim offset from screen centre
  boost: false,
  joy: { on: false, id: null, ax: 0, ay: 0, dx: 0, dy: 0 },
  bstId: null,
};

function aimScreenXY() { return { x: vw()/2 + inp.dx, y: vh()/2 + inp.dy }; }

// ─────────────────────────────────────────────────────────────
// NETWORK
// ─────────────────────────────────────────────────────────────
let lastInputAt = 0;

function connectRoom() {
  const room = ROOMS[Math.random() * ROOMS.length | 0];
  const url  = MATCHMAKER.replace(/^https?:/, 'wss:') + `/room?room=${room}`;
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';
  ws.onopen  = () => {};
  ws.onerror = () => {};
  ws.onclose = () => { if (running) setTimeout(connectRoom, 2000); };
  ws.onmessage = ({ data }) => {
    let msg; try { msg = JSON.parse(data); } catch { return; }
    handleMsg(msg);
  };
}

function wsSend(type, payload) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type, ...payload }));
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'init':
      myId  = msg.id;
      WORLD = msg.WORLD || WORLD;
      tickMs = msg.tickMs || tickMs;
      pred.on = false;
      break;

    case 'joinDenied':
      alert(msg.message || 'Arena is full.');
      showMenu(true);
      running = false;
      break;

    case 'gameState': {
      WORLD  = msg.world || WORLD;
      tickMs = msg.tickMs || tickMs;
      orbs   = msg.orbs  || [];
      scoreboard = msg.leaderboard || [];
      selfState  = msg.self || {};
      reconcileSnakes(msg.players || [], msg.bots || []);
      // Seed prediction from first snapshot
      if (myId && !pred.on) {
        const me = snakes.get(myId);
        if (me?.net?.cur) {
          pred.x  = me.net.cur.ux;
          pred.y  = me.net.cur.uy;
          pred.ang = me.net.cur.ang;
          pred.on  = true;
        }
      }
      break;
    }

    case 'particleSpawn':
      if (Array.isArray(msg.events)) msg.events.forEach(e => spawnParticles(e.x, e.y, e.color, e.n));
      else spawnParticles(msg.x, msg.y, msg.color, msg.n);
      break;

    case 'died':
      running = false;
      pred.on = false;
      document.getElementById('death').style.display = 'flex';
      document.getElementById('death-score').textContent = `Final score: ${msg.score}`;
      break;
  }
}

// Throttled input sender
function sendInput(now) {
  if (!running || !myId) return;
  const gap = 1000 / INPUT_HZ;
  if (now - lastInputAt < gap) return;
  const p = aimScreenXY();
  wsSend('input', { angle: Math.atan2(p.y - vh()/2, (p.x - vw()/2) || 1e-4), boosting: inp.boost });
  lastInputAt = now;
}

// ─────────────────────────────────────────────────────────────
// SNAKE MANAGEMENT
// ─────────────────────────────────────────────────────────────
function ensureSnake(snap, isPlayer) {
  const now = performance.now();
  let s = snakes.get(snap.id);
  if (!s) {
    const init = { x: snap.x, y: snap.y, ux: snap.x, uy: snap.y, ang: snap.angle, len: snap.length, at: now };
    s = { id: snap.id, name: snap.name, skin: snap.skinIdx, isPlayer,
          net: { prev: init, cur: init },
          trail: [{ x: snap.x, y: snap.y }],
          r: { x: snap.x, y: snap.y, ang: snap.angle, len: snap.length },
          seenAt: now };
    snakes.set(snap.id, s);
    return s;
  }
  const pc = s.net.cur;
  const uw = unwrapPos({ x: pc.ux, y: pc.uy }, { x: snap.x, y: snap.y });
  s.name = snap.name; s.skin = snap.skinIdx; s.isPlayer = isPlayer;
  s.net.prev = pc;
  s.net.cur  = { x: snap.x, y: snap.y, ux: uw.x, uy: uw.y, ang: snap.angle, len: snap.length, at: now };
  s.seenAt   = now;
  return s;
}

function reconcileSnakes(players, bots) {
  const live = new Set();
  players.forEach(s => { live.add(s.id); ensureSnake(s, true);  });
  bots.forEach(s    => { live.add(s.id); ensureSnake(s, false); });
  for (const id of snakes.keys()) {
    if (!live.has(id) && (id !== myId || !running)) snakes.delete(id);
  }
}

function getInterp(s, rt) {
  const p = s.net.prev || s.net.cur;
  const c = s.net.cur;
  const dur = Math.max(1, (c.at - p.at) || tickMs);
  const t   = clamp((rt - p.at) / dur, 0, 1.2);
  return {
    id: s.id, name: s.name, skin: s.skin,
    x:   lerp(p.ux, c.ux, t),
    y:   lerp(p.uy, c.uy, t),
    ang: angleLerp(p.ang, c.ang, t),
    len: lerp(p.len, c.len, t),
    rad: snakeR(c.len),
    isMe: s.id === myId,
  };
}

// ─────────────────────────────────────────────────────────────
// PARTICLES
// ─────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  const cnt = Math.max(1, Math.ceil(n * (IS_MOBILE ? .30 : .55)));
  for (let i = 0; i < cnt; i++) {
    const a  = Math.random() * PI2;
    const sp = 1 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
                     r: 2 + Math.random()*4, color, life: 1,
                     decay: .028 + Math.random()*.04 });
  }
}

function tickParticles(ds) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * ds; p.y += p.vy * ds;
    p.vx *= .96; p.vy *= .96;
    p.life -= p.decay * ds;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─────────────────────────────────────────────────────────────
// TRAIL UPDATES
// ─────────────────────────────────────────────────────────────
function updateTrails(rt) {
  for (const s of snakes.values()) {
    const ri = getInterp(s, rt);
    s.r = { x: ri.x, y: ri.y, ang: ri.ang, len: ri.len };
    const trail = s.trail;
    const last  = trail[trail.length - 1];
    const dx = ri.x - last.x, dy = ri.y - last.y;
    if (dx*dx + dy*dy > 4) trail.push({ x: ri.x, y: ri.y });
    else trail[trail.length - 1] = { x: ri.x, y: ri.y };
    const maxLen = Math.max(18, Math.ceil(ri.len) + 12);
    while (trail.length > Math.min(Q.trailCap, maxLen)) trail.shift();
  }
}

// ─────────────────────────────────────────────────────────────
// RENDER — BACKGROUND
// ─────────────────────────────────────────────────────────────
function drawBg() {
  const w = vw(), h = vh();
  const g = ctx.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0,   '#152e1e');
  g.addColorStop(.45, '#0c2519');
  g.addColorStop(1,   '#06110c');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);

  ensureBgPat();
  ctx.save();
  ctx.translate(((-cam.x % 48) + 48) % 48, ((-cam.y % 48) + 48) % 48);
  ctx.fillStyle = bgPat;
  ctx.globalAlpha = IS_MOBILE ? .38 : .80;
  ctx.fillRect(-48, -48, w + 96, h + 96);
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────
// RENDER — ORBS
// ─────────────────────────────────────────────────────────────
function drawOrbs(rt, bounds) {
  const cx = vw() / 2, cy = vh() / 2;
  const list = [];

  for (const orb of orbs) {
    const s = toScreen(orb.x, orb.y);
    if (!onVP(s.x, s.y, bounds)) continue;
    list.push({ orb, sx: s.x, sy: s.y,
                r: orb.r + Math.sin((orb.pulse || 0) + rt * .006) * 1.2 });
  }

  // Sort nearest first, cap budget
  if (list.length > Q.orbBudget) {
    list.sort((a, b) => (a.sx-cx)**2+(a.sy-cy)**2 - (b.sx-cx)**2-(b.sy-cy)**2);
    list.length = Q.orbBudget;
  }

  for (const { orb, sx, sy, r } of list) {
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, PI2);
    ctx.fillStyle = orb.color;
    if (!IS_MOBILE) { ctx.shadowColor = orb.color; ctx.shadowBlur = 9; }
    ctx.fill();
    if (!IS_MOBILE) {
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(sx - r*.24, sy - r*.24, r*.28, 0, PI2);
      ctx.fillStyle = 'rgba(255,255,255,.52)';
      ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
}

// ─────────────────────────────────────────────────────────────
// RENDER — PARTICLES
// ─────────────────────────────────────────────────────────────
function drawParticles(bounds) {
  ctx.shadowBlur = 0;
  for (const p of particles) {
    const s = toScreen(p.x, p.y);
    if (!onVP(s.x, s.y, bounds)) continue;
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(s.x, s.y, p.r, 0, PI2);
    ctx.fillStyle = p.color;
    if (!IS_MOBILE) { ctx.shadowColor = p.color; ctx.shadowBlur = 5; }
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur  = 0;
}

// ─────────────────────────────────────────────────────────────
// RENDER — SNAKES
// ─────────────────────────────────────────────────────────────
function drawSnake(s) {
  if (!s.r) return;
  const skin  = SKINS[s.skin] || SKINS[0];
  const trail = s.trail;
  const r     = snakeR(s.r.len);

  // Body trail
  if (trail.length > 1) {
    ctx.beginPath();
    const f = toScreen(trail[0].x, trail[0].y);
    ctx.moveTo(f.x, f.y);

    if (IS_MOBILE) {
      for (let i = Q.trailStep; i < trail.length; i += Q.trailStep) {
        const p = toScreen(trail[i].x, trail[i].y);
        ctx.lineTo(p.x, p.y);
      }
    } else {
      for (let i = Q.trailStep; i < trail.length; i += Q.trailStep) {
        const pi = Math.max(0, i - Q.trailStep);
        const pp = toScreen(trail[pi].x, trail[pi].y);
        const pc = toScreen(trail[i].x,  trail[i].y);
        ctx.quadraticCurveTo(pp.x, pp.y, (pc.x + pp.x) / 2, (pc.y + pp.y) / 2);
      }
    }

    ctx.strokeStyle = skin.body;
    ctx.lineWidth   = r * 2;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    if (!IS_MOBILE && s.id === myId) { ctx.shadowColor = skin.glow; ctx.shadowBlur = 15; }
    ctx.stroke();

    // Specular sheen
    ctx.strokeStyle = 'rgba(255,255,255,.12)';
    ctx.lineWidth   = r * .9;
    ctx.shadowBlur  = 0;
    ctx.stroke();
  }

  // Head
  const h = toScreen(s.r.x, s.r.y);
  ctx.beginPath();
  ctx.arc(h.x, h.y, r * 1.18, 0, PI2);
  ctx.fillStyle = skin.head;
  if (!IS_MOBILE && s.id === myId) { ctx.shadowColor = skin.glow; ctx.shadowBlur = 11; }
  ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes
  const ang = s.r.ang;
  const eR  = r * .30;
  const eOff = r * .55;
  const px  = -Math.sin(ang), py = Math.cos(ang);
  const fx  = Math.cos(ang) * r * .32, fy = Math.sin(ang) * r * .32;
  for (const side of [-1, 1]) {
    const ex = h.x + fx + px * eOff * side;
    const ey = h.y + fy + py * eOff * side;
    ctx.beginPath(); ctx.arc(ex, ey, eR, 0, PI2);
    ctx.fillStyle = skin.eye; ctx.fill();
    ctx.beginPath(); ctx.arc(ex + Math.cos(ang)*eR*.3, ey + Math.sin(ang)*eR*.3, eR*.42, 0, PI2);
    ctx.fillStyle = '#111'; ctx.fill();
  }

  // Name tag
  if (Q.names || s.id === myId) {
    const fs = Math.max(11, r);
    ctx.font        = `bold ${fs}px Trebuchet MS`;
    ctx.textAlign   = 'center';
    ctx.fillStyle   = 'rgba(0,0,0,.42)';
    ctx.fillText(s.name, h.x+1, h.y - r*2.1 + 1);
    ctx.fillStyle   = '#fffaf0';
    ctx.fillText(s.name, h.x,   h.y - r*2.1);
  }
}

function getVisibleSnakes() {
  const b = vpBounds(CULL_SNAKE);
  const list = [];
  for (const s of snakes.values()) {
    if (!s.r) continue;
    const h = toScreen(s.r.x, s.r.y);
    if (!onVP(h.x, h.y, b)) continue;
    list.push(s);
  }
  // Draw smaller snakes first (under larger)
  list.sort((a, b) => (a.r?.len || 0) - (b.r?.len || 0));
  return list;
}

// ─────────────────────────────────────────────────────────────
// RENDER — JOYSTICK (mobile only)
// ─────────────────────────────────────────────────────────────
function drawJoystick() {
  if (!IS_MOBILE || !inp.joy.on) return;
  const { ax, ay, dx, dy } = inp.joy;

  ctx.save();

  // Outer ring
  ctx.beginPath(); ctx.arc(ax, ay, JOY_R, 0, PI2);
  ctx.fillStyle   = 'rgba(5,16,10,.30)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(240,203,114,.20)';
  ctx.lineWidth   = 1.5; ctx.stroke();

  // Direction indicator
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax+dx, ay+dy);
  ctx.strokeStyle = 'rgba(240,203,114,.15)';
  ctx.lineWidth   = 1.5; ctx.stroke();

  // Knob
  ctx.beginPath(); ctx.arc(ax+dx, ay+dy, JOY_KNOB, 0, PI2);
  ctx.fillStyle = inp.boost ? 'rgba(216,169,58,.74)' : 'rgba(126,217,87,.66)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.18)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Centre dot
  ctx.beginPath(); ctx.arc(ax, ay, 4, 0, PI2);
  ctx.fillStyle = 'rgba(240,203,114,.38)'; ctx.fill();

  ctx.restore();
}

// ─────────────────────────────────────────────────────────────
// RENDER — CURSOR (desktop only)
// ─────────────────────────────────────────────────────────────
function drawCursor() {
  if (IS_MOBILE) return;
  const p = aimScreenXY();
  ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, PI2);
  ctx.strokeStyle = 'rgba(255,255,255,.78)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, PI2);
  ctx.fillStyle   = '#fff'; ctx.fill();
}

// ─────────────────────────────────────────────────────────────
// RENDER — MINIMAP
// ─────────────────────────────────────────────────────────────
let lastMmAt = 0;

function drawMinimap(now) {
  if (now - lastMmAt < Q.mmMs) return;
  lastMmAt = now;

  const sz = mmCv.width;
  mmCtx.clearRect(0, 0, sz, sz);
  mmCtx.save();
  mmCtx.beginPath(); mmCtx.arc(sz/2, sz/2, sz/2, 0, PI2); mmCtx.clip();

  const bg = mmCtx.createLinearGradient(0, 0, 0, sz);
  bg.addColorStop(0, 'rgba(18,54,35,.94)');
  bg.addColorStop(1, 'rgba(5,16,10,.97)');
  mmCtx.fillStyle = bg; mmCtx.fillRect(0, 0, sz, sz);

  const sc   = sz / WORLD;
  const step = IS_MOBILE ? 10 : 6;
  for (let i = 0; i < orbs.length; i += step) {
    const o = orbs[i]; if (!o) continue;
    mmCtx.beginPath(); mmCtx.arc(o.x * sc, o.y * sc, 1.2, 0, PI2);
    mmCtx.fillStyle = o.color + '88'; mmCtx.fill();
  }

  for (const s of snakes.values()) {
    if (!s.r) continue;
    const sx  = wrapCoord(s.r.x) * sc;
    const sy  = wrapCoord(s.r.y) * sc;
    const isMe = s.id === myId;
    mmCtx.beginPath(); mmCtx.arc(sx, sy, isMe ? 3.5 : 2.2, 0, PI2);
    mmCtx.fillStyle = isMe ? '#fff7df' : (SKINS[s.skin] || SKINS[0]).body;
    if (!IS_MOBILE && isMe) { mmCtx.shadowColor = '#fff7df'; mmCtx.shadowBlur = 5; }
    mmCtx.fill(); mmCtx.shadowBlur = 0;
  }

  mmCtx.restore();
}

// ─────────────────────────────────────────────────────────────
// HUD UPDATE
// ─────────────────────────────────────────────────────────────
let lastHudAt  = 0;

function updateHUD(now) {
  if (now - lastHudAt < (IS_MOBILE ? 200 : 120)) return;
  lastHudAt = now;

  const me = selfState[myId] || { rank: 0, score: 0, boostE: 0 };
  document.getElementById('v-rank').textContent  = me.rank ? `#${me.rank}` : '#-';
  document.getElementById('v-score').textContent = me.score || 0;
  // Use CSS scaleX instead of width for GPU acceleration
  document.getElementById('boost-fill').style.transform =
    `scaleX(${clamp((me.boostE || 0), 0, 1)})`;

  buildLBRows('lb-list',  scoreboard,       s => s.id === myId, 10, 130);
  buildLBRows('mlb-list', scoreboard.slice(0, 5), s => s.id === myId, 10, 74);
}

function buildLBRows(id, list, isMeFn, fontSize, nameWidth) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  for (let i = 0; i < list.length; i++) {
    const e = list[i];
    const row = document.createElement('div');
    row.className = 'lb-row' + (isMeFn(e) ? ' lb-me' : '');
    const name = document.createElement('span');
    name.className = 'lb-name';
    name.style.maxWidth = nameWidth + 'px';
    name.textContent = `${i+1}. ${e.name}`;
    const score = document.createElement('span');
    score.textContent = e.score;
    row.appendChild(name);
    row.appendChild(score);
    el.appendChild(row);
  }
}

// ─────────────────────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────────────────────
let lastFrameAt = 0;

function loop(now) {
  if (!running) return;
  requestAnimationFrame(loop);

  const dt = Math.min(now - lastFrameAt, 100);
  lastFrameAt = now;
  const ds = dt / 16.667;
  const rt = now - INTERP_MS;

  updateQuality(now);
  stepPrediction(dt);
  updateTrails(rt);
  updateCamera();
  sendInput(now);
  tickParticles(ds);

  const ob = vpBounds(CULL_ORB);
  const pb = vpBounds(24);

  drawBg();
  drawOrbs(now, ob);
  drawParticles(pb);
  getVisibleSnakes().forEach(drawSnake);
  drawJoystick();
  drawCursor();
  drawMinimap(now);
  updateHUD(now);
}

// ─────────────────────────────────────────────────────────────
// GAME START / STOP
// ─────────────────────────────────────────────────────────────
function showMenu(show) {
  document.getElementById('menu').style.display  = show ? 'flex' : 'none';
  document.getElementById('death').style.display = 'none';
}

function startGame() {
  const name = document.getElementById('name-inp').value.trim() || 'Player';
  showMenu(false);

  // Reset input
  inp.joy = { on: false, id: null, ax: 0, ay: 0, dx: 0, dy: 0 };
  inp.dx = 0; inp.dy = 0;
  inp.boost = false; inp.bstId = null;

  const join = () => wsSend('join', { name, skinIdx: selectedSkin });
  const tryJoin = () => ws?.readyState === 1 ? join() : setTimeout(tryJoin, 100);

  if (!ws || ws.readyState > 1) { connectRoom(); setTimeout(tryJoin, 200); }
  else tryJoin();

  if (!running) {
    running     = true;
    lastFrameAt = performance.now();
    lastFpsAt   = lastFrameAt;
    requestAnimationFrame(loop);
  }
}

}, { passive: true });

document.addEventListener('mouseup',   e => { if (e.button === 0) inp.boost = false; });

document.addEventListener('keyup',     e => { if (e.code === 'Space')   inp.boost = false; });

// ─────────────────────────────────────────────────────────────
// MOBILE TOUCH  (joystick left 60%, boost button right)
// ─────────────────────────────────────────────────────────────
const bstBtn = document.getElementById('bst-btn');

function isBstArea(touch) {
  const r = bstBtn.getBoundingClientRect();
  return touch.clientX >= r.left && touch.clientX <= r.right &&
         touch.clientY >= r.top  && touch.clientY <= r.bottom;
}

function onTouchStart(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (isBstArea(t)) {
      inp.bstId = t.identifier;
      inp.boost  = true;
      bstBtn.classList.add('on');
      continue;
    }
    if (inp.joy.id === null && t.clientX < vw() * .60) {
      inp.joy = { on: true, id: t.identifier, ax: t.clientX, ay: t.clientY, dx: 0, dy: 0 };
      inp.dx  = 0; inp.dy = 0;
    }
  }
}

function onTouchMove(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier !== inp.joy.id) continue;
    const rawDx = t.clientX - inp.joy.ax;
    const rawDy = t.clientY - inp.joy.ay;
    const dist  = Math.hypot(rawDx, rawDy);
    const cs    = dist > JOY_R ? JOY_R / dist : 1;
    inp.joy.dx  = rawDx * cs;
    inp.joy.dy  = rawDy * cs;
    inp.dx      = rawDx * 2.8;   // amplified for angle calculation
    inp.dy      = rawDy * 2.8;
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === inp.bstId) {
      inp.bstId  = null;
      inp.boost   = false;
      bstBtn.classList.remove('on');
    }
    if (t.identifier === inp.joy.id) {
      inp.joy = { on: false, id: null, ax: 0, ay: 0, dx: 0, dy: 0 };
      inp.dx  = 0; inp.dy = 0;
    }
  }
}

canvas.addEventListener('touchstart',  onTouchStart, { passive: false });
canvas.addEventListener('touchmove',   onTouchMove,  { passive: false });
canvas.addEventListener('touchend',    onTouchEnd,   { passive: false });
canvas.addEventListener('touchcancel', onTouchEnd,   { passive: false });

// Boost button dedicated touch (handles tap that starts on the button)
